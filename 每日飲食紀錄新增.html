<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>新增每日體重與三圍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #007AFF;
            --secondary-color: #5856D6;
            --background-color: #F2F2F7;
            --card-background: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #8E8E93;
            --border-color: #C6C6C8;
            --success-color: #34C759;
            --error-color: #FF3B30;
            --loading-color: #FF9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        .form-layout {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .form-card {
            background: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            flex: 1;
        }

        .portion-panel {
            width: 320px;
            background: #f8fbff;
            border: 1px solid #dbeafe;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(30, 64, 175, 0.08);
            position: sticky;
            top: 20px;
        }

        .portion-panel-header {
            padding: 14px 16px;
            border-bottom: 1px solid #dbeafe;
            font-size: 0.875rem;
            font-weight: 700;
            color: #1d4ed8;
        }

        .portion-panel-body {
            padding: 12px;
            max-height: 70vh;
            overflow: auto;
            font-size: 0.8125rem;
        }

        .portion-empty {
            color: var(--text-secondary);
            background: #fff;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            padding: 10px;
        }

        .portion-card {
            background: #fff;
            border: 1px solid #d9e9ff;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .portion-period {
            font-size: 0.75rem;
            color: #1d4ed8;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .portion-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 4px;
        }

        .portion-row-label {
            font-weight: 600;
            color: #111827;
            white-space: nowrap;
        }

        .portion-row-value {
            color: #374151;
            font-variant-numeric: tabular-nums;
        }

        .portion-summary-row {
            align-items: flex-start;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed #dbeafe;
        }

        .portion-summary-value {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            text-align: left;
        }

        .portion-kcal-total {
            font-weight: 700;
            color: #1f2937;
        }

        .portion-kcal-breakdown {
            display: block;
            max-width: 100%;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
            text-align: left;
            font-size: 0.78rem;
            line-height: 1.45;
        }

        .portion-kcal-item {
            white-space: normal;
            display: inline;
            margin-left: 8px;
        }

        .portion-kcal-item:first-child {
            margin-left: 0;
        }

        .portion-legend {
            margin-top: 8px;
            font-size: 0.75rem;
            color: #6b7280;
            text-align: left;
            line-height: 1.5;
        }

        .portion-legend::before {
            content: "* ";
            color: #ef4444;
            font-weight: 700;
        }

        .form-header {
            background: linear-gradient(135deg, #FF2D55, #FF6B6B);
            color: white;
            padding: 24px 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .form-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            flex: 1;
        }

        .form-body {
            padding: 24px 20px;
        }

        .form-section {
            margin-bottom: 28px;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        label.required::after {
            content: ' *';
            color: var(--error-color);
        }

        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--card-background);
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group input {
            flex: 1;
        }

        .input-group span {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .meal-entry {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 14px;
            background: #fafafa;
            margin-bottom: 14px;
        }

        .meal-entry-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .meal-entry-header label {
            margin-bottom: 0;
        }

        .meal-time-input {
            width: 190px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meal-time-input select {
            padding: 10px 12px;
        }

        .meal-time-separator {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-top: 8px;
        }

        .checkbox-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9375rem;
            color: var(--text-primary);
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .bowel-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            align-items: start;
            margin-top: 16px;
        }

        .bowel-row .form-group {
            margin-bottom: 0;
        }

        @media screen and (max-width: 680px) {
            .bowel-row {
                grid-template-columns: 1fr;
            }
        }

        .photo-upload {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .photo-upload:hover {
            border-color: var(--primary-color);
            background: rgba(0, 122, 255, 0.05);
        }

        .photo-upload input[type="file"] {
            display: none;
        }

        .photo-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 12px;
            display: none;
        }

        .photo-preview.show {
            display: block;
        }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .upload-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .form-actions {
            padding: 20px;
            background: var(--card-background);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF2D55, #FF6B6B);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 45, 85, 0.3);
        }

        .btn-secondary {
            background: var(--background-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #E5E5EA;
        }

        .portion-popup-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            padding: 8px 16px;
            background: #1d4ed8;
            color: white;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            z-index: 1800;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .desktop-portion-panel {
            display: block;
        }

        .portion-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1790;
            align-items: flex-start;
            justify-content: center;
            padding: 56px 12px 12px;
        }

        .portion-modal.show {
            display: flex;
        }

        .portion-modal-card {
            width: min(520px, 100%);
            max-height: calc(100vh - 72px);
            overflow: auto;
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 10px 28px rgba(0,0,0,0.2);
            border: 1px solid #dbeafe;
        }

        .success-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--success-color);
            color: white;
            padding: 24px 32px;
            border-radius: 16px;
            font-size: 1.125rem;
            font-weight: 600;
            z-index: 2000;
            box-shadow: 0 8px 32px rgba(52, 199, 89, 0.3);
        }

        .success-message.show { display: block; }

        .loading-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--loading-color);
            color: white;
            padding: 24px 32px;
            border-radius: 16px;
            font-size: 1.125rem;
            font-weight: 600;
            z-index: 2000;
        }

        .loading-message.show { display: block; }

        .error-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--error-color);
            color: white;
            padding: 24px 32px;
            border-radius: 16px;
            font-size: 1.125rem;
            font-weight: 600;
            z-index: 2000;
            max-width: 300px;
            text-align: center;
        }

        .error-message.show { display: block; }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1500;
        }

        .overlay.show { display: block; }

        @media screen and (max-width: 428px) {
            .container { padding: 12px; }
            .form-layout { flex-direction: column; }
            .form-card { border-radius: 20px; }
            .form-header { padding: 16px; flex-wrap: wrap; gap: 10px; }
            .form-header h1 { font-size: 1.25rem; }
            .form-body { padding: 20px 16px; }
            .form-section { margin-bottom: 24px; }
            .form-row { grid-template-columns: 1fr; }
            .form-group { margin-bottom: 16px; }
            input { padding: 12px 14px; font-size: 16px; }
            .form-actions { padding: 16px; flex-direction: column; gap: 10px; }
            .btn { padding: 14px 20px; }
            .portion-popup-btn { top: 10px; right: 10px; display: flex; }
            .desktop-portion-panel { display: none; }
        }

        @media screen and (min-width: 429px) and (max-width: 1024px) {
            .container { padding: 24px; max-width: 1040px; }
            .form-card { border-radius: 20px; }
            .form-header { padding: 28px 24px; }
            .form-header h1 { font-size: 1.625rem; }
            .form-body { padding: 28px 24px; }
            .form-section { margin-bottom: 32px; }
            .form-actions { padding: 24px; gap: 16px; }
            .btn { padding: 16px 28px; }
            .portion-popup-btn { top: 14px; right: 14px; display: none; }
            .desktop-portion-panel { display: block; }
        }

        @media screen and (min-width: 1025px) {
            .container { padding: 40px; max-width: 1240px; }
            .form-card { border-radius: 24px; }
            .form-header { padding: 36px 32px; border-radius: 24px 24px 0 0; }
            .form-header h1 { font-size: 1.875rem; }
            .form-body { padding: 36px 32px; }
            .form-actions { padding: 28px 32px; gap: 16px; }
            .btn { max-width: 200px; margin: 0 auto; }
            .portion-popup-btn { top: 16px; right: 16px; display: none; }
            .desktop-portion-panel { display: block; }
        }
    </style>
</head>
<body>
    <button type="button" class="portion-popup-btn" id="openPortionModalBtn">管理員飲食份數表</button>

    <div class="container">
        <div class="form-layout">
        <div class="form-card">
            <div class="form-header">
                <a href="每日飲食紀錄.html" class="back-btn">← 返回</a>
                <h1>新增每日飲食紀錄</h1>
                <div style="width: 70px;"></div>
            </div>
            
            <form class="form-body" id="weightForm">
                <div class="form-section">
                    <div class="section-title">基本資訊</div>
                    
                    <div class="form-group">
                        <label class="required">紀錄日期</label>
                        <input type="date" id="recordDate" name="recordDate" required>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="section-title">體重與體脂</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">體重</label>
                            <div class="input-group">
                                <input type="number" id="weight" name="weight" placeholder="請輸入體重" step="0.1" required>
                                <span>kg</span>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>體脂</label>
                            <div class="input-group">
                                <input type="number" id="bodyFat" name="bodyFat" placeholder="體脂率" step="0.1">
                                <span>%</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>水</label>
                            <div class="input-group">
                                <input type="number" id="waterIntake" name="waterIntake" placeholder="請輸入喝水量" step="1" min="0">
                                <span>cc / 天</span>
                            </div>
                        </div>
                    </div>

                    <div class="bowel-row">
                        <div class="form-group">
                            <label>排便與否</label>
                            <div class="checkbox-group">
                                <label class="checkbox-item"><input type="radio" name="bowelMovement" id="bowelMovementYes" value="有排便">有排便</label>
                                <label class="checkbox-item"><input type="radio" name="bowelMovement" id="bowelMovementNo" value="無排便">無排便</label>
                            </div>
                        </div>

                        <div class="form-group" id="stoolConditionGroup" style="display:none;">
                            <label>排便狀況</label>
                            <div class="checkbox-group">
                                <label class="checkbox-item"><input type="checkbox" id="stoolDiarrhea" value="拉肚子">拉肚子</label>
                                <label class="checkbox-item"><input type="checkbox" id="stoolNormal" value="正常便">正常便</label>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="section-title">飲食記錄（六餐）</div>

                    <div class="meal-entry">
                        <div class="meal-entry-header">
                            <label for="breakfast">早餐</label>
                            <div class="meal-time-input">
                                <select id="breakfastHour"></select>
                                <span class="meal-time-separator">時</span>
                                <select id="breakfastMinute"></select>
                                <span class="meal-time-separator">分</span>
                            </div>
                        </div>
                        <textarea id="breakfast" name="breakfast" rows="3" placeholder="記錄早餐內容" style="width:100%;padding:12px 16px;border:1px solid var(--border-color);border-radius:10px;font-size:1rem;resize:vertical;font-family:inherit;"></textarea>
                    </div>

                    <div class="meal-entry">
                        <div class="meal-entry-header">
                            <label for="morningSnack">早點</label>
                            <div class="meal-time-input">
                                <select id="morningSnackHour"></select>
                                <span class="meal-time-separator">時</span>
                                <select id="morningSnackMinute"></select>
                                <span class="meal-time-separator">分</span>
                            </div>
                        </div>
                        <textarea id="morningSnack" name="morningSnack" rows="3" placeholder="記錄早點內容" style="width:100%;padding:12px 16px;border:1px solid var(--border-color);border-radius:10px;font-size:1rem;resize:vertical;font-family:inherit;"></textarea>
                    </div>

                    <div class="meal-entry">
                        <div class="meal-entry-header">
                            <label for="lunch">午餐</label>
                            <div class="meal-time-input">
                                <select id="lunchHour"></select>
                                <span class="meal-time-separator">時</span>
                                <select id="lunchMinute"></select>
                                <span class="meal-time-separator">分</span>
                            </div>
                        </div>
                        <textarea id="lunch" name="lunch" rows="3" placeholder="記錄午餐內容" style="width:100%;padding:12px 16px;border:1px solid var(--border-color);border-radius:10px;font-size:1rem;resize:vertical;font-family:inherit;"></textarea>
                    </div>

                    <div class="meal-entry">
                        <div class="meal-entry-header">
                            <label for="afternoonTea">午茶</label>
                            <div class="meal-time-input">
                                <select id="afternoonTeaHour"></select>
                                <span class="meal-time-separator">時</span>
                                <select id="afternoonTeaMinute"></select>
                                <span class="meal-time-separator">分</span>
                            </div>
                        </div>
                        <textarea id="afternoonTea" name="afternoonTea" rows="3" placeholder="記錄午茶內容" style="width:100%;padding:12px 16px;border:1px solid var(--border-color);border-radius:10px;font-size:1rem;resize:vertical;font-family:inherit;"></textarea>
                    </div>

                    <div class="meal-entry">
                        <div class="meal-entry-header">
                            <label for="dinner">晚餐</label>
                            <div class="meal-time-input">
                                <select id="dinnerHour"></select>
                                <span class="meal-time-separator">時</span>
                                <select id="dinnerMinute"></select>
                                <span class="meal-time-separator">分</span>
                            </div>
                        </div>
                        <textarea id="dinner" name="dinner" rows="3" placeholder="記錄晚餐內容" style="width:100%;padding:12px 16px;border:1px solid var(--border-color);border-radius:10px;font-size:1rem;resize:vertical;font-family:inherit;"></textarea>
                    </div>

                    <div class="meal-entry">
                        <div class="meal-entry-header">
                            <label for="lateNightSnack">宵夜</label>
                            <div class="meal-time-input">
                                <select id="lateNightSnackHour"></select>
                                <span class="meal-time-separator">時</span>
                                <select id="lateNightSnackMinute"></select>
                                <span class="meal-time-separator">分</span>
                            </div>
                        </div>
                        <textarea id="lateNightSnack" name="lateNightSnack" rows="3" placeholder="記錄宵夜內容" style="width:100%;padding:12px 16px;border:1px solid var(--border-color);border-radius:10px;font-size:1rem;resize:vertical;font-family:inherit;"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>備註</label>
                        <textarea id="note" name="note" rows="2" placeholder="其他備註" style="width:100%;padding:12px 16px;border:1px solid var(--border-color);border-radius:10px;font-size:1rem;resize:vertical;font-family:inherit;"></textarea>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="section-title">照片上傳</div>
                    
                    <div class="form-group">
                        <label>上傳照片（可多張）</label>
                        <div class="photo-upload" id="photoUpload">
                            <input type="file" id="photo" name="photo" accept="image/*" multiple>
                            <div class="upload-icon">📷</div>
                            <div class="upload-text">點擊上傳照片（可多張）</div>
                        </div>
                        <div id="photoPreviewContainer" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;"></div>
                    </div>
                </div>
            </form>
            
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" id="resetBtn">清除資料</button>
                <button type="submit" class="btn btn-primary" id="submitBtn">儲存資料</button>
            </div>
        </div>
        <aside class="portion-panel desktop-portion-panel">
            <div class="portion-panel-header">管理員飲食份數表</div>
            <div class="portion-panel-body" id="portionPanelContentDesktop">
                <div class="portion-empty">請先選擇紀錄日期</div>
            </div>
        </aside>
        </div>
    </div>

    <div class="portion-modal" id="portionModal">
        <div class="portion-modal-card portion-panel">
            <div class="portion-panel-header" style="display:flex;justify-content:space-between;align-items:center;">
                <span>管理員飲食份數表</span>
                <button type="button" id="closePortionModalBtn" style="border:none;background:none;font-size:1.25rem;cursor:pointer;color:#1d4ed8;">✕</button>
            </div>
            <div class="portion-panel-body" id="portionPanelContentModal">
                <div class="portion-empty">請先選擇紀錄日期</div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="success-message" id="successMessage">✓ 資料儲存成功！</div>
    <div class="loading-message" id="loadingMessage">儲存中...</div>
    <div class="error-message" id="errorMessage"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyK0sGYh_M-bJUE4NhZJxz5HkllW4jXxw",
            authDomain: "akso-weightcontroll.firebaseapp.com",
            projectId: "akso-weightcontroll",
            storageBucket: "akso-weightcontroll.firebasestorage.app",
            messagingSenderId: "523229071422",
            appId: "1:523229071422:web:c36fd110cc5812fea2a96f",
            measurementId: "G-DFEEKX4V0S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUser = null;
        let userPortionRecords = [];
        let portionRecordsLoaded = false;
        const meals = ['早餐', '早點', '午餐', '午茶', '晚餐', '宵夜'];
        const mealTimeFields = {
            breakfast: { hour: 'breakfastHour', minute: 'breakfastMinute' },
            morningSnack: { hour: 'morningSnackHour', minute: 'morningSnackMinute' },
            lunch: { hour: 'lunchHour', minute: 'lunchMinute' },
            afternoonTea: { hour: 'afternoonTeaHour', minute: 'afternoonTeaMinute' },
            dinner: { hour: 'dinnerHour', minute: 'dinnerMinute' },
            lateNightSnack: { hour: 'lateNightSnackHour', minute: 'lateNightSnackMinute' }
        };

        function buildSelectOptions(selectId, values, placeholder) {
            const select = document.getElementById(selectId);
            if (!select) return;
            select.innerHTML = `<option value="">${placeholder}</option>` + values.map((value) => (
                `<option value="${value}">${value}</option>`
            )).join('');
        }

        function initializeMealTimeSelects() {
            const hours = Array.from({ length: 25 }, (_, i) => String(i).padStart(2, '0'));
            const minutes = ['00', '10', '20', '30', '40', '50'];
            Object.values(mealTimeFields).forEach(({ hour, minute }) => {
                buildSelectOptions(hour, hours, '時');
                buildSelectOptions(minute, minutes, '分');
            });
        }

        function getMealTimeValue(key) {
            const fields = mealTimeFields[key];
            if (!fields) return '';
            const hour = document.getElementById(fields.hour)?.value || '';
            const minute = document.getElementById(fields.minute)?.value || '';
            return hour && minute ? `${hour}:${minute}` : '';
        }

        function setMealTimeValue(key, value) {
            const fields = mealTimeFields[key];
            if (!fields) return;
            const [hour = '', minute = ''] = String(value || '').split(':');
            const hourSelect = document.getElementById(fields.hour);
            const minuteSelect = document.getElementById(fields.minute);
            if (hourSelect) hourSelect.value = hour;
            if (minuteSelect) minuteSelect.value = minute;
        }

        function getCheckedValues(ids = []) {
            return ids
                .map((id) => document.getElementById(id))
                .filter((el) => el && el.checked)
                .map((el) => el.value);
        }

        function getRadioValue(name) {
            return document.querySelector(`input[name="${name}"]:checked`)?.value || '';
        }

        function updateStoolConditionVisibility() {
            const hasBowelMovement = getRadioValue('bowelMovement') === '有排便';
            const stoolGroup = document.getElementById('stoolConditionGroup');
            if (!stoolGroup) return;
            stoolGroup.style.display = hasBowelMovement ? 'block' : 'none';
            if (!hasBowelMovement) {
                ['stoolDiarrhea', 'stoolNormal'].forEach((id) => {
                    const el = document.getElementById(id);
                    if (el) el.checked = false;
                });
            }
        }

        initializeMealTimeSelects();
        document.querySelectorAll('input[name="bowelMovement"]').forEach((radio) => {
            radio.addEventListener('change', updateStoolConditionVisibility);
        });
        updateStoolConditionVisibility();

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace('login.html');
                return;
            }
            currentUser = user;
            const adminDoc = await getDoc(doc(db, "管理員", user.uid));
            if (adminDoc.exists() && adminDoc.data().role === 'admin') {
                await signOut(auth);
                window.location.replace('index.html');
            }
            await refreshPortionPanel();
        });

        window.onpageshow = function(event) {
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    window.location.replace('login.html');
                } else {
                    const adminDoc = await getDoc(doc(db, "管理員", user.uid));
                    if (adminDoc.exists() && adminDoc.data().role === 'admin') {
                        await signOut(auth);
                        window.location.replace('index.html');
                    }
                }
            });
        };

        const portionModal = document.getElementById('portionModal');
        const openPortionModalBtn = document.getElementById('openPortionModalBtn');
        const closePortionModalBtn = document.getElementById('closePortionModalBtn');
        openPortionModalBtn.addEventListener('click', () => {
            portionModal.classList.add('show');
        });
        closePortionModalBtn.addEventListener('click', () => {
            portionModal.classList.remove('show');
        });
        portionModal.addEventListener('click', (e) => {
            if (e.target === portionModal) {
                portionModal.classList.remove('show');
            }
        });

        function updatePortionPopupButtonPosition() {
            const isMobile = window.matchMedia('(max-width: 428px)').matches;
            if (!isMobile) {
                openPortionModalBtn.style.top = '';
                return;
            }
            const baseTop = 10;
            const vv = window.visualViewport;
            const offsetTop = vv ? vv.offsetTop : 0;
            openPortionModalBtn.style.top = `${baseTop + Math.max(0, offsetTop)}px`;
        }

        updatePortionPopupButtonPosition();
        window.addEventListener('resize', updatePortionPopupButtonPosition);
        window.addEventListener('orientationchange', updatePortionPopupButtonPosition);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', updatePortionPopupButtonPosition);
            window.visualViewport.addEventListener('scroll', updatePortionPopupButtonPosition);
        }

        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('recordDate').value = today;
            refreshPortionPanel();
        });

        const recordDateInput = document.getElementById('recordDate');
        recordDateInput.addEventListener('change', function() {
            refreshPortionPanel();
        });
        recordDateInput.addEventListener('input', function() {
            refreshPortionPanel();
        });

        async function loadUserPortionRecords() {
            if (!currentUser) return;
            const q = query(collection(db, "飲食份數表"), where("userId", "==", currentUser.uid));
            const snapshot = await getDocs(q);
            userPortionRecords = snapshot.docs.map(docSnap => ({
                id: docSnap.id,
                ...docSnap.data()
            })).sort((a, b) => (b.紀錄日期 || '').localeCompare(a.紀錄日期 || ''));
            portionRecordsLoaded = true;
        }

        async function refreshPortionPanel() {
            const dateStr = document.getElementById('recordDate').value;
            if (!currentUser) {
                renderPortionPanelByDate(dateStr);
                return;
            }
            try {
                if (!portionRecordsLoaded) {
                    await loadUserPortionRecords();
                }
                renderPortionPanelByDate(dateStr);
            } catch (error) {
                console.error('載入飲食份數表失敗:', error);
                getPortionPanels().forEach((panel) => {
                    panel.innerHTML = '<div class="portion-empty">載入飲食份數表失敗</div>';
                });
            }
        }

        function getPortionPanels() {
            return [
                document.getElementById('portionPanelContentDesktop'),
                document.getElementById('portionPanelContentModal')
            ].filter(Boolean);
        }

        function renderPortionPanelByDate(dateStr) {
            const panels = getPortionPanels();
            if (panels.length === 0) return;
            if (!dateStr) {
                panels.forEach((panel) => {
                    panel.innerHTML = '<div class="portion-empty">請先選擇紀錄日期</div>';
                });
                return;
            }

            const matched = userPortionRecords.filter(portion => {
                const startDate = portion.紀錄日期 || '';
                const endDate = portion.結束日期 || startDate;
                return dateStr >= startDate && dateStr <= endDate;
            });

            if (matched.length === 0) {
                panels.forEach((panel) => {
                    panel.innerHTML = `<div class="portion-empty">${dateStr} 沒有對應的飲食份數表</div>`;
                });
                return;
            }

            let html = '';
            const buildPortionSummaryHtml = (portion) => {
                const totals = { C: 0, P: 0, F: 0, V: 0 };
                const kcalRates = { C: 70, P: 75, F: 60, V: 25 };
                meals.forEach((meal) => {
                    Object.keys(totals).forEach((nutrient) => {
                        totals[nutrient] += Number(portion[`${meal}${nutrient}`] || 0);
                    });
                });
                const totalKcal = Object.keys(totals).reduce((sum, nutrient) => sum + totals[nutrient] * kcalRates[nutrient], 0);
                const kcalText = Object.keys(totals).map((nutrient) => {
                    const kcal = totals[nutrient] * kcalRates[nutrient];
                    const percent = totalKcal > 0 ? Math.round((kcal / totalKcal) * 100) : 0;
                    return `<span class="portion-kcal-item">${nutrient}:${kcal} (${percent}%)</span>`;
                }).join(' ');
                return `<div class="portion-row portion-summary-row"><span class="portion-row-label">Total</span><span class="portion-row-value">C:${totals.C} P:${totals.P} F:${totals.F} V:${totals.V}</span></div>
                    <div class="portion-row"><span class="portion-row-label">Kcal</span><span class="portion-row-value portion-summary-value"><span class="portion-kcal-total">總熱量 ${totalKcal}</span><span class="portion-kcal-breakdown">${kcalText}</span></span></div>
                    <div class="portion-legend">C 碳水　P 蛋白質　F 水果　V 蔬菜</div>`;
            };
            matched.forEach(portion => {
                const startDate = portion.紀錄日期 || '-';
                const endDate = portion.結束日期 || startDate;
                html += `<div class="portion-card"><div class="portion-period">期間：${startDate} 到 ${endDate}</div>`;
                meals.forEach(meal => {
                    const time = portion[`${meal}時間`] || '';
                    const c = portion[`${meal}C`] || 0;
                    const p = portion[`${meal}P`] || 0;
                    const f = portion[`${meal}F`] || 0;
                    const v = portion[`${meal}V`] || 0;
                    html += `<div class="portion-row"><span class="portion-row-label">${meal}${time ? ' ' + time : ''}</span><span class="portion-row-value">C:${c} P:${p} F:${f} V:${v}</span></div>`;
                });
                html += buildPortionSummaryHtml(portion);
                html += '</div>';
            });

            panels.forEach((panel) => {
                panel.innerHTML = html;
            });
        }

        const photoUpload = document.getElementById('photoUpload');
        const photoInput = document.getElementById('photo');
        const photoPreviewContainer = document.getElementById('photoPreviewContainer');
        let uploadedPhotos = [];

        photoUpload.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            photoPreviewContainer.innerHTML = '';
            uploadedPhotos = [];
            
            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imgContainer = document.createElement('div');
                    imgContainer.style.cssText = 'position:relative;width:80px;height:80px;';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:8px;';
                    
                    const removeBtn = document.createElement('button');
                    removeBtn.innerHTML = '✕';
                    removeBtn.style.cssText = 'position:absolute;top:-5px;right:-5px;background:red;color:white;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;';
                    removeBtn.onclick = () => {
                        uploadedPhotos.splice(index, 1);
                        imgContainer.remove();
                    };
                    
                    imgContainer.appendChild(img);
                    imgContainer.appendChild(removeBtn);
                    photoPreviewContainer.appendChild(imgContainer);
                    uploadedPhotos.push(e.target.result);
                };
                reader.readAsDataURL(file);
            });
        });

        function showMessage(element, duration = 3000) {
            overlay.classList.add('show');
            element.classList.add('show');
            setTimeout(() => {
                overlay.classList.remove('show');
                element.classList.remove('show');
            }, duration);
        }

        const form = document.getElementById('weightForm');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const successMessage = document.getElementById('successMessage');
        const loadingMessage = document.getElementById('loadingMessage');
        const errorMessage = document.getElementById('errorMessage');
        const overlay = document.getElementById('overlay');

        submitBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            
            const recordDate = document.getElementById('recordDate').value;
            const weight = document.getElementById('weight').value.trim();
            
            if (!recordDate || !weight) {
                alert('請填寫必填欄位');
                return;
            }

            submitBtn.disabled = true;
            showMessage(loadingMessage, 15000);

            try {
                const q = query(collection(db, "客戶資料"), where("userId", "==", currentUser.uid));
                const querySnapshot = await getDocs(q);
                let customerName = '';
                if (!querySnapshot.empty) {
                    customerName = querySnapshot.docs[0].data().姓名 || '';
                }

                const photoFiles = Array.from(photoInput.files);
                const photoUrls = [];
                
                for (let i = 0; i < photoFiles.length; i++) {
                    const photoFile = photoFiles[i];
                    const photoRef = ref(storage, `photos/${currentUser.uid}/${Date.now()}_${i}_${photoFile.name}`);
                    await uploadBytes(photoRef, photoFile);
                    const url = await getDownloadURL(photoRef);
                    photoUrls.push(url);
                }

                const formData = {
                    userId: currentUser.uid,
                    客戶姓名: customerName,
                    紀錄日期: recordDate,
                    體重: parseFloat(weight),
                    體脂: document.getElementById('bodyFat').value ? parseFloat(document.getElementById('bodyFat').value) : null,
                    喝水量: document.getElementById('waterIntake').value ? parseFloat(document.getElementById('waterIntake').value) : null,
                    排便與否: getRadioValue('bowelMovement'),
                    排便狀況: getCheckedValues(['stoolDiarrhea', 'stoolNormal']),
                    早餐時間: getMealTimeValue('breakfast'),
                    早餐: document.getElementById('breakfast').value.trim(),
                    早點時間: getMealTimeValue('morningSnack'),
                    早點: document.getElementById('morningSnack').value.trim(),
                    午餐時間: getMealTimeValue('lunch'),
                    午餐: document.getElementById('lunch').value.trim(),
                    午茶時間: getMealTimeValue('afternoonTea'),
                    午茶: document.getElementById('afternoonTea').value.trim(),
                    晚餐時間: getMealTimeValue('dinner'),
                    晚餐: document.getElementById('dinner').value.trim(),
                    宵夜時間: getMealTimeValue('lateNightSnack'),
                    宵夜: document.getElementById('lateNightSnack').value.trim(),
                    備註: document.getElementById('note').value.trim(),
                    照片: photoUrls,
                    建立時間: serverTimestamp()
                };

                await addDoc(collection(db, "每日體重三圍"), formData);
                
                showMessage(successMessage);
                
                setTimeout(() => {
                    window.location.href = '每日飲食紀錄.html';
                }, 1500);
                
            } catch (error) {
                console.error('錯誤: ', error);
                errorMessage.textContent = '儲存失敗: ' + error.message;
                showMessage(errorMessage, 5000);
            } finally {
                submitBtn.disabled = false;
            }
        });

        resetBtn.addEventListener('click', function() {
            if (confirm('確定要清除所有資料嗎？')) {
                form.reset();
                photoPreviewContainer.innerHTML = '';
                uploadedPhotos = [];
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('recordDate').value = today;
                refreshPortionPanel();
            }
        });
    </script>
</body>
</html>
