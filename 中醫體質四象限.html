<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>中醫體質四象限檢測</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #007AFF;
            --secondary-color: #5856D6;
            --background-color: #F2F2F7;
            --card-background: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #8E8E93;
            --border-color: #C6C6C8;
            --success-color: #34C759;
            --error-color: #FF3B30;
            --loading-color: #FF9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        .form-card {
            background: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, #FF2D55, #FF6B6B);
            color: white;
            padding: 24px 20px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .form-header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .form-body {
            padding: 24px 20px;
        }

        .question-group {
            margin-bottom: 20px;
            padding: 16px;
            background: var(--background-color);
            border-radius: 12px;
        }

        .question-group:last-child {
            margin-bottom: 0;
        }

        .question-label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: block;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .option-item:hover {
            border-color: var(--primary-color);
            background: rgba(0, 122, 255, 0.05);
        }

        .option-item.selected {
            border-color: var(--primary-color);
            background: rgba(0, 122, 255, 0.1);
        }

        .option-item input[type="radio"] {
            display: none;
        }

        .option-item span {
            width: 100%;
            text-align: center;
            font-size: 0.9375rem;
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(135deg, #FF2D55, #FF6B6B);
            transition: width 0.3s;
            z-index: 1000;
        }

        .form-actions {
            padding: 20px;
            background: var(--card-background);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF2D55, #FF6B6B);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 45, 85, 0.3);
        }

        .btn-secondary {
            background: var(--background-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #E5E5EA;
        }

        .device-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            z-index: 1000;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .success-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--success-color);
            color: white;
            padding: 24px 32px;
            border-radius: 16px;
            font-size: 1.125rem;
            font-weight: 600;
            z-index: 2000;
            box-shadow: 0 8px 32px rgba(52, 199, 89, 0.3);
        }

        .success-message.show { display: block; }

        .loading-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--loading-color);
            color: white;
            padding: 24px 32px;
            border-radius: 16px;
            font-size: 1.125rem;
            font-weight: 600;
            z-index: 2000;
        }

        .loading-message.show { display: block; }

        .error-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--error-color);
            color: white;
            padding: 24px 32px;
            border-radius: 16px;
            font-size: 1.125rem;
            font-weight: 600;
            z-index: 2000;
            max-width: 300px;
            text-align: center;
        }

        .error-message.show { display: block; }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1500;
        }

        .overlay.show { display: block; }

        @media screen and (max-width: 428px) {
            .container { padding: 12px; }
            .form-card { border-radius: 20px; }
            .form-header { padding: 16px; flex-wrap: wrap; gap: 10px; }
            .form-header h1 { font-size: 1.1rem; }
            .form-body { padding: 16px 12px; }
            .question-group { padding: 12px; margin-bottom: 16px; }
            .option-grid { grid-template-columns: 1fr; }
            .form-actions { padding: 16px; flex-direction: column; gap: 10px; }
            .btn { padding: 14px 20px; }
        }

        @media screen and (min-width: 429px) and (max-width: 1024px) {
            .container { padding: 24px; max-width: 700px; }
            .form-card { border-radius: 20px; }
            .form-header { padding: 28px 24px; }
            .form-header h1 { font-size: 1.5rem; }
            .form-body { padding: 28px 24px; }
            .form-actions { padding: 24px; gap: 16px; }
            .btn { padding: 16px 28px; }
        }

        @media screen and (min-width: 1025px) {
            .container { padding: 40px; max-width: 800px; }
            .form-card { border-radius: 24px; }
            .form-header { padding: 36px 32px; border-radius: 24px 24px 0 0; }
            .form-header h1 { font-size: 1.75rem; }
            .form-body { padding: 36px 32px; }
            .form-actions { padding: 28px 32px; gap: 16px; }
            .btn { max-width: 200px; margin: 0 auto; }
        }
    </style>
</head>

                },
                {

                    "type": "singleChoice",

                },
                {

                },
                {
                    "id": 27,
                    "filename": "wdq27.png",
                    "question": "經常有黑眼圈",
                    "type": "singleChoice",
                    "options": ["是", "否"]
                }
            ]
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyK0sGYh_M-bJUE4NhZJxz5HkllW4jXxw",
            authDomain: "akso-weightcontroll.firebaseapp.com",
            projectId: "akso-weightcontroll",
            storageBucket: "akso-weightcontroll.firebasestorage.app",
            messagingSenderId: "523229071422",
            appId: "1:523229071422:web:c36fd110cc5812fea2a96f",
            measurementId: "G-DFEEKX4V0S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let existingDocId = null;

        function generateQuestions() {
            const form = document.getElementById('constitutionForm');
            form.innerHTML = '';
            
            questionsData.items.forEach((item, index) => {
                const questionGroup = document.createElement('div');
                questionGroup.className = 'question-group';
                questionGroup.innerHTML = `
                    <label class="question-label">${index + 1}. ${item.question}</label>
                    <div class="option-grid" data-question-id="${item.id}">
                        ${item.options.map((option, optIndex) => `
                            <label class="option-item" data-value="${optIndex}">
                                <input type="radio" name="q${item.id}" value="${optIndex}">
                                <span>${option}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                form.appendChild(questionGroup);
            });
            
            // 顯示結果
            const resultSection = document.createElement('div');
            resultSection.className = 'question-group';
            resultSection.innerHTML = `
                <div class="result-display" style="text-align:center;padding:20px;background:var(--card-background);border-radius:12px;">
                    <div style="display:flex;justify-content:space-around;margin-bottom:20px;">
                        <div>
                            <div style="font-size:0.875rem;color:var(--text-secondary);">冷熱體質分數</div>
                            <div id="coldHotScore" style="font-size:2rem;font-weight:bold;color:#FF6B6B;">-</div>
                        </div>
                        <div>
                            <div style="font-size:0.875rem;color:var(--text-secondary);">濕乾體質分數</div>
                            <div id="wetDryScore" style="font-size:2rem;font-weight:bold;color:#5856D6;">-</div>
                        </div>
                    </div>
                    <div style="font-size:1rem;font-weight:600;margin-bottom:16px;">體質分類結果</div>
                    <div class="quadrant-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:280px;margin:0 auto;">
                        <div class="quadrant" id="q1" style="padding:16px;background:#FFE5B4;border-radius:8px;">
                            <div style="font-weight:600;">陽虛</div>
                            <div style="font-size:0.75rem;">怕冷+偏乾</div>
                        </div>
                        <div class="quadrant" id="q2" style="padding:16px;background:#E5B4FF;border-radius:8px;">
                            <div style="font-weight:600;">痰濕</div>
                            <div style="font-size:0.75rem;">怕冷+偏濕</div>
                        </div>
                        <div class="quadrant" id="q3" style="padding:16px;background:#B4E5FF;border-radius:8px;">
                            <div style="font-weight:600;">陰虛</div>
                            <div style="font-size:0.75rem;">怕熱+偏乾</div>
                        </div>
                        <div class="quadrant" id="q4" style="padding:16px;background:#B4FFB4;border-radius:8px;">
                            <div style="font-weight:600;">陽盛</div>
                            <div style="font-size:0.75rem;">怕熱+偏濕</div>
                        </div>
                    </div>
                    <div id="resultText" style="margin-top:16px;font-size:1.125rem;font-weight:bold;color:var(--primary-color);">-</div>
                </div>
            `;
            form.appendChild(resultSection);

            document.querySelectorAll('.option-item').forEach(item => {
                item.addEventListener('click', function() {
                    const group = this.closest('.option-grid');
                    group.querySelectorAll('.option-item').forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                    this.querySelector('input').checked = true;
                    updateProgress();
                });
            });
        }

        function updateProgress() {
            const coldHotQuestions = questionsData.items.filter(item => item.filename.startsWith('ch'));
            const wetDryQuestions = questionsData.items.filter(item => item.filename.startsWith('wdq'));
            
            let coldHotScore = 0;
            let wetDryScore = 0;
            
            coldHotQuestions.forEach(item => {
                const selected = document.querySelector(`input[name="q${item.id}"]:checked`);
                if (selected) {
                    coldHotScore += parseInt(selected.value);
                }
            });
            
            wetDryQuestions.forEach(item => {
                const selected = document.querySelector(`input[name="q${item.id}"]:checked`);
                if (selected) {
                    wetDryScore += parseInt(selected.value);
                }
            });
            
            let answered = 0;
            for (let i = 1; i <= questionsData.total; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected) answered++;
            }
            
            const progress = (answered / questionsData.total) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            
            if (answered === questionsData.total) {
                document.getElementById('coldHotScore').textContent = coldHotScore + ' 分';
                document.getElementById('wetDryScore').textContent = wetDryScore + ' 分';
                
                // 計算平均分數
                const coldHotAvg = coldHotScore / coldHotQuestions.length;
                const wetDryAvg = wetDryScore / wetDryQuestions.length;
                
                // 判斷落在哪個象限
                let quadrant = '';
                let resultText = '';
                
                // 較低分數 = 怕冷/偏乾，較高分數 = 怕熱/偏濕
                if (coldHotAvg < 1.5 && wetDryAvg < 1.5) {
                    quadrant = 'q1';
                    resultText = '陽虛體質';
                } else if (coldHotAvg < 1.5 && wetDryAvg >= 1.5) {
                    quadrant = 'q2';
                    resultText = '痰濕體質';
                } else if (coldHotAvg >= 1.5 && wetDryAvg < 1.5) {
                    quadrant = 'q3';
                    resultText = '陰虛體質';
                } else {
                    quadrant = 'q4';
                    resultText = '陽盛體質';
                }
                
                // 重置所有象限樣式
                ['q1', 'q2', 'q3', 'q4'].forEach(id => {
                    const el = document.getElementById(id);
                    el.style.border = 'none';
                    el.style.transform = 'scale(1)';
                });
                
                // 標記選中的象限
                const selectedEl = document.getElementById(quadrant);
                selectedEl.style.border = '3px solid var(--primary-color)';
                selectedEl.style.transform = 'scale(1.05)';
                
                document.getElementById('resultText').textContent = resultText;
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace('login.html');
                return;
            }
            currentUser = user;
            const adminDoc = await getDoc(doc(db, "管理員", user.uid));
            if (adminDoc.exists() && adminDoc.data().role === 'admin') {
                await signOut(auth);
                window.location.replace('index.html');
            }
            
            generateQuestions();
            loadUserName(user.uid);
            loadExistingData(user.uid);
        });

        async function loadUserName(userId) {
            try {
                const q = query(collection(db, "客戶資料"), where("userId", "==", userId));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    const data = querySnapshot.docs[0].data();
                    if (data.姓名) {
                        document.getElementById('formTitle').textContent = '中醫體質檢測';
                    }
                }
            } catch (error) {
                console.error('載入姓名失敗:', error);
            }
        }

        async function loadExistingData(userId) {
            try {
                const q = query(collection(db, "中醫體質四象限"), where("userId", "==", userId));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    existingDocId = querySnapshot.docs[0].id;
                    const data = querySnapshot.docs[0].data();
                    
                    if (data.回答) {
                        Object.keys(data.回答).forEach(key => {
                            const val = data.回答[key];
                            const radio = document.querySelector(`input[name="${key}"][value="${val}"]`);
                            if (radio) {
                                radio.checked = true;
                                radio.closest('.option-item').classList.add('selected');
                            }
                        });
                    }
                    
                    document.getElementById('submitBtn').textContent = '更新資料';
                    document.getElementById('formTitle').textContent = '中醫體質檢測';
                    updateProgress();
                }
            } catch (error) {
                console.error('載入現有資料失敗:', error);
            }
        }

        function updateDeviceIndicator() {
            const width = window.innerWidth;
            const indicator = document.getElementById('deviceIndicator');
            const icon = document.getElementById('deviceIcon');
            const text = document.getElementById('deviceText');
            
            if (width <= 428) {
                icon.textContent = '📱';
                text.textContent = 'iPhone 版';
            } else if (width <= 1024) {
                icon.textContent = '📱';
                text.textContent = 'iPad 版';
            } else {
                icon.textContent = '💻';
                text.textContent = '電腦版';
            }
            indicator.style.display = 'flex';
        }

        window.addEventListener('load', updateDeviceIndicator);
        window.addEventListener('resize', updateDeviceIndicator);

        const form = document.getElementById('constitutionForm');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const successMessage = document.getElementById('successMessage');
        const loadingMessage = document.getElementById('loadingMessage');
        const errorMessage = document.getElementById('errorMessage');
        const overlay = document.getElementById('overlay');

        function showMessage(element, duration = 3000) {
            overlay.classList.add('show');
            element.classList.add('show');
            setTimeout(() => {
                overlay.classList.remove('show');
                element.classList.remove('show');
            }, duration);
        }

        submitBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            
            const coldHotQuestions = questionsData.items.filter(item => item.filename.startsWith('ch'));
            const wetDryQuestions = questionsData.items.filter(item => item.filename.startsWith('wdq'));
            
            const answers = {};
            let coldHotScore = 0;
            let wetDryScore = 0;
            
            // 驗證並計算冷熱體質分數
            for (let i = 0; i < coldHotQuestions.length; i++) {
                const item = coldHotQuestions[i];
                const selected = document.querySelector(`input[name="q${item.id}"]:checked`);
                if (!selected) {
                    alert('請回答所有冷熱體質題目');
                    return;
                }
                answers[`q${item.id}`] = parseInt(selected.value);
                coldHotScore += parseInt(selected.value);
            }
            
            // 驗證並計算濕乾體質分數
            for (let i = 0; i < wetDryQuestions.length; i++) {
                const item = wetDryQuestions[i];
                const selected = document.querySelector(`input[name="q${item.id}"]:checked`);
                if (!selected) {
                    alert('請回答所有濕乾體質題目');
                    return;
                }
                answers[`q${item.id}`] = parseInt(selected.value);
                wetDryScore += parseInt(selected.value);
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '儲存中...';
            showMessage(loadingMessage, 15000);

            try {
                const q = query(collection(db, "客戶資料"), where("userId", "==", currentUser.uid));
                const querySnapshot = await getDocs(q);
                let customerName = '';
                if (!querySnapshot.empty) {
                    customerName = querySnapshot.docs[0].data().姓名 || '';
                }

                const formData = {
                    userId: currentUser.uid,
                    客戶姓名: customerName,
                    回答: answers,
                    冷熱體質分數: coldHotScore,
                    濕乾體質分數: wetDryScore,
                    建立時間: serverTimestamp()
                };

                if (existingDocId) {
                    await updateDoc(doc(db, "中醫體質四象限", existingDocId), formData);
                } else {
                    await addDoc(collection(db, "中醫體質四象限"), formData);
                }
                
                showMessage(successMessage);
                submitBtn.textContent = '更新資料';
                
            } catch (error) {
                console.error('錯誤: ', error);
                errorMessage.textContent = '儲存失敗: ' + error.message;
                showMessage(errorMessage, 5000);
            } finally {
                submitBtn.disabled = false;
            }
        });

        resetBtn.addEventListener('click', function() {
            if (confirm('確定要清除所有資料嗎？')) {
                form.reset();
                document.querySelectorAll('.option-item').forEach(opt => opt.classList.remove('selected'));
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('coldHotScore').textContent = '-';
                document.getElementById('wetDryScore').textContent = '-';
                document.getElementById('resultText').textContent = '-';
                ['q1', 'q2', 'q3', 'q4'].forEach(id => {
                    const el = document.getElementById(id);
                    el.style.border = 'none';
                    el.style.transform = 'scale(1)';
                });
            }
        });
    </script>
</body>
</html>
