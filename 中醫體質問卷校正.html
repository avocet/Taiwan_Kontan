<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中醫體質問卷逐題校正</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --card: #ffffff;
            --text: #172033;
            --muted: #667085;
            --line: #d9e2f1;
            --primary: #0f6fff;
            --primary-soft: #e7f0ff;
            --accent: #10b981;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Noto Sans TC", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15,111,255,0.12), transparent 28%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
        }
        .page {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .topbar h1 {
            margin: 0;
            font-size: 1.75rem;
        }
        .topbar p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
        }
        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn, .nav-btn, .chip input + span {
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            cursor: pointer;
            transition: 0.18s ease;
        }
        .btn, .nav-btn {
            padding: 10px 14px;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
        }
        .btn.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .btn:hover, .nav-btn:hover {
            transform: translateY(-1px);
        }
        .layout {
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 18px;
        }
        .side-card, .main-card {
            background: var(--card);
            border: 1px solid rgba(15, 23, 42, 0.06);
            border-radius: 22px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.06);
        }
        .side-card {
            padding: 18px;
            position: sticky;
            top: 20px;
            height: fit-content;
        }
        .progress-num {
            font-size: 2.1rem;
            font-weight: 700;
        }
        .progress-label {
            color: var(--muted);
            font-size: 0.95rem;
        }
        .progress-bar {
            margin-top: 14px;
            height: 10px;
            background: #edf2fa;
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-bar span {
            display: block;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), #5aa2ff);
        }
        .legend {
            margin-top: 18px;
            display: grid;
            gap: 10px;
            font-size: 0.875rem;
            color: var(--muted);
        }
        .main-card {
            padding: 24px;
        }
        .question-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--primary-soft);
            color: var(--primary);
            font-size: 0.875rem;
            font-weight: 600;
        }
        .question-title {
            margin: 14px 0 18px;
            font-size: 1.7rem;
            line-height: 1.35;
        }
        .option-list {
            display: grid;
            gap: 10px;
            margin-bottom: 22px;
        }
        .option-card {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 16px;
            border-radius: 16px;
            background: #f8fbff;
            border: 1px solid #dce7f8;
            align-items: center;
        }
        .option-text {
            font-size: 1rem;
        }
        .score-badge {
            flex-shrink: 0;
            min-width: 72px;
            text-align: center;
            padding: 8px 10px;
            border-radius: 999px;
            font-weight: 700;
            background: #fff;
            border: 1px solid #d8e3f6;
        }
        .score-badge.negative { color: #2563eb; }
        .score-badge.neutral { color: #64748b; }
        .score-badge.positive { color: var(--accent); }
        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin: 0 0 12px;
        }
        .choice-group {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }
        .chip input {
            display: none;
        }
        .chip input + span {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            padding: 12px 14px;
            font-weight: 600;
            background: #fff;
        }
        .chip input:checked + span {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 10px 22px rgba(15, 111, 255, 0.18);
        }
        .preview-box {
            padding: 14px 16px;
            border-radius: 16px;
            background: #fbfcfe;
            border: 1px dashed #cdd9ec;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 20px;
        }
        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-row .nav-btn {
            min-width: 120px;
        }
        .status {
            margin-top: 16px;
            min-height: 24px;
            font-size: 0.9rem;
        }
        .status.success { color: var(--accent); }
        .status.error { color: var(--danger); }
        @media (max-width: 860px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .side-card {
                position: static;
            }
        }
        @media (max-width: 640px) {
            .choice-group {
                grid-template-columns: 1fr;
            }
            .question-title {
                font-size: 1.35rem;
            }
            .option-card {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div>
                <h1>中醫體質問卷逐題校正</h1>
                <p>一題一題調整題軸與方向，儲存後會同步套用到問卷、學員頁與管理員頁。</p>
            </div>
            <div class="top-actions">
                <a class="btn" href="customer.html">返回管理首頁</a>
                <button class="btn primary" id="saveBtn" type="button">儲存設定</button>
            </div>
        </div>

        <div class="layout">
            <aside class="side-card">
                <div class="progress-num" id="progressNum">1 / 27</div>
                <div class="progress-label">目前校正題目</div>
                <div class="progress-bar"><span id="progressFill"></span></div>
                <div class="legend">
                    <div>二選題：依方向套用 `-1 / +1` 或 `+1 / -1`</div>
                    <div>三選題：依方向套用 `-1 / 0 / +1` 或 `+1 / 0 / -1`</div>
                </div>
            </aside>

            <main class="main-card">
                <div class="question-tag" id="questionMeta">題號 1</div>
                <h2 class="question-title" id="questionTitle">載入中...</h2>

                <div class="section-title">選項與目前分數</div>
                <div class="option-list" id="optionList"></div>

                <div class="section-title">這一題屬於哪一軸</div>
                <div class="choice-group" id="axisGroup">
                    <label class="chip">
                        <input type="radio" name="axis" value="coldHot">
                        <span>冷熱</span>
                    </label>
                    <label class="chip">
                        <input type="radio" name="axis" value="wetDry">
                        <span>濕乾</span>
                    </label>
                </div>

                <div class="section-title">選項排列方向</div>
                <div class="choice-group" id="directionGroup">
                    <label class="chip">
                        <input type="radio" name="direction" value="normal">
                        <span>排列正確</span>
                    </label>
                    <label class="chip">
                        <input type="radio" name="direction" value="reverse">
                        <span>反轉</span>
                    </label>
                </div>

                <div class="preview-box" id="previewBox"></div>

                <div class="nav-row">
                    <button class="nav-btn" id="prevBtn" type="button">上一題</button>
                    <button class="nav-btn" id="nextBtn" type="button">下一題</button>
                </div>

                <div class="status" id="statusText"></div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyK0sGYh_M-bJUE4NhZJxz5HkllW4jXxw",
            authDomain: "akso-weightcontroll.firebaseapp.com",
            projectId: "akso-weightcontroll",
            storageBucket: "akso-weightcontroll.firebasestorage.app",
            messagingSenderId: "523229071422",
            appId: "1:523229071422:web:c36fd110cc5812fea2a96f",
            measurementId: "G-DFEEKX4V0S"
        };

        const questionsData = [
            { id: 1, filename: "wdq1.png", question: "平時耳朵狀況", options: ["有耳油會癢，經常用棉花棒", "耳屎結塊，常掏耳朵"] },
            { id: 2, filename: "chq2.png", question: "容易暈車", options: ["會或經常", "很少或不會"] },
            { id: 3, filename: "wdq3.png", question: "喉嚨有痰", options: ["會或經常", "很少或不會"] },
            { id: 4, filename: "wdq4.png", question: "嘴巴容易散發異味", options: ["是", "否"] },
            { id: 5, filename: "wdq5.png", question: "比較喜歡吃", options: ["甜食&澱粉", "肉類"] },
            { id: 6, filename: "chq6.png", question: "喜歡喝的飲料或水", options: ["冷的", "常溫", "熱的"] },
            { id: 7, filename: "wdq7.png", question: "飯後易疲倦", options: ["是", "否"] },
            { id: 8, filename: "wdq8.png", question: "蚊蟲叮咬", options: ["消腫快", "消腫慢"] },
            { id: 9, filename: "wdq9.png", question: "睡眠狀況", options: ["淺眠多夢", "易入睡"] },
            { id: 10, filename: "wdq10.png", question: "睡醒狀況", options: ["常常睡不飽", "精神很好"] },
            { id: 11, filename: "chq11.png", question: "平常比較怕熱還是怕冷", options: ["怕熱", "怕冷"] },
            { id: 12, filename: "chq12.png", question: "手腳四肢易冰冷", options: ["是", "否"] },
            { id: 13, filename: "wdq13.png", question: "下肢或臉水腫時", options: ["容易消腫", "不易消腫"] },
            { id: 14, filename: "chq14.png", question: "精神狀況", options: ["容易疲倦", "精神良好"] },
            { id: 15, filename: "wdq15.png", question: "呼吸狀況", options: ["容易喘不過氣或胸悶", "呼吸順暢/不易胸悶"] },
            { id: 16, filename: "wdq16.png", question: "女性分泌物", options: ["白帶", "黃帶", "我是男性"] },
            { id: 17, filename: "chq17.png", question: "生理期前睡眠狀況", options: ["頭痛或不易入睡", "較無影響", "我是男性"] },
            { id: 18, filename: "chq18.png", question: "生理前後或期間狀況", options: ["月經結塊或腹痛或腹瀉", "稍微不適或無影響", "我是男性"] },
            { id: 19, filename: "wdq19.png", question: "消化狀況", options: ["易脹氣", "容易消化"] },
            { id: 20, filename: "wdq20.png", question: "排便狀況", options: ["經常腹瀉或軟便", "正常或乾硬"] },
            { id: 21, filename: "chq21.png", question: "夜間排尿狀況", options: ["頻尿，例如：每晚1-2次", "很少或不會"] },
            { id: 22, filename: "wdq22.png", question: "腎結石、膽結石、尿道結石", options: ["曾經有或現在有", "沒有"] },
            { id: 23, filename: "wdq23.png", question: "蕁麻疹", options: ["曾經有或狀況嚴重", "很少或不曾發生"] },
            { id: 24, filename: "wdq24.png", question: "痛風", options: ["曾經有或狀況嚴重", "很少或不曾發生"] },
            { id: 25, filename: "wdq25.png", question: "血糖不耐或糖尿病", options: ["曾經有或狀況嚴重", "很少或不曾發生"] },
            { id: 26, filename: "chq26.png", question: "臉部氣色或唇部周圍", options: ["明亮", "暗沉"] },
            { id: 27, filename: "wdq27.png", question: "經常有黑眼圈", options: ["是", "否"] }
        ];

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const configRef = doc(db, "中醫體質問卷設定", "current");

        let currentIndex = 0;
        let currentUser = null;
        let localConfig = buildDefaultConfig();

        function buildDefaultConfig() {
            return Object.fromEntries(
                questionsData.map((item) => [
                    `q${item.id}`,
                    { axis: item.filename.startsWith('ch') ? 'coldHot' : 'wetDry', reverse: false }
                ])
            );
        }

        function getQuestionConfig(questionId) {
            return localConfig[`q${questionId}`] || { axis: 'wetDry', reverse: false };
        }

        function getOptionScore(optionCount, optionIndex, reverse) {
            let score = 0;
            if (optionCount === 2) score = optionIndex === 0 ? -1 : 1;
            else score = optionIndex === 0 ? -1 : optionIndex === 1 ? 0 : 1;
            return reverse ? -score : score;
        }

        function scoreClass(score) {
            if (score > 0) return "positive";
            if (score < 0) return "negative";
            return "neutral";
        }

        function renderQuestion() {
            const item = questionsData[currentIndex];
            const config = getQuestionConfig(item.id);
            document.getElementById('progressNum').textContent = `${currentIndex + 1} / ${questionsData.length}`;
            document.getElementById('progressFill').style.width = `${((currentIndex + 1) / questionsData.length) * 100}%`;
            document.getElementById('questionMeta').textContent = `題號 ${item.id} ． ${config.axis === 'coldHot' ? '冷熱題' : '濕乾題'}`;
            document.getElementById('questionTitle').textContent = item.question;

            const optionHtml = item.options.map((option, optionIndex) => {
                const score = getOptionScore(item.options.length, optionIndex, Boolean(config.reverse));
                const scoreText = score > 0 ? `+${score}` : `${score}`;
                return `
                    <div class="option-card">
                        <div class="option-text">${optionIndex + 1}. ${option}</div>
                        <div class="score-badge ${scoreClass(score)}">${scoreText}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('optionList').innerHTML = optionHtml;

            document.querySelectorAll('input[name="axis"]').forEach((input) => {
                input.checked = input.value === config.axis;
            });
            document.querySelectorAll('input[name="direction"]').forEach((input) => {
                input.checked = (input.value === 'reverse') === Boolean(config.reverse);
            });

            document.getElementById('previewBox').innerHTML = `
                目前設定：
                <strong>${config.axis === 'coldHot' ? '冷熱' : '濕乾'}</strong> /
                <strong>${config.reverse ? '反轉' : '排列正確'}</strong><br>
                儲存後，所有新舊體質結果都會優先依這份題目設定重新計算。
            `;

            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === questionsData.length - 1;
        }

        function bindChoiceHandlers() {
            document.querySelectorAll('input[name="axis"]').forEach((input) => {
                input.addEventListener('change', () => {
                    const item = questionsData[currentIndex];
                    localConfig[`q${item.id}`] = {
                        ...getQuestionConfig(item.id),
                        axis: input.value
                    };
                    renderQuestion();
                });
            });

            document.querySelectorAll('input[name="direction"]').forEach((input) => {
                input.addEventListener('change', () => {
                    const item = questionsData[currentIndex];
                    localConfig[`q${item.id}`] = {
                        ...getQuestionConfig(item.id),
                        reverse: input.value === 'reverse'
                    };
                    renderQuestion();
                });
            });
        }

        async function loadSavedConfig() {
            const snapshot = await getDoc(configRef);
            if (!snapshot.exists()) return;
            const data = snapshot.data() || {};
            const savedItems = data.items && typeof data.items === 'object' ? data.items : {};
            localConfig = { ...buildDefaultConfig(), ...savedItems };
        }

        async function ensureAdmin(user) {
            const adminDoc = await getDoc(doc(db, "管理員", user.uid));
            if (adminDoc.exists() && adminDoc.data()?.role === 'admin') {
                return true;
            }

            const usersByUid = await getDocs(query(collection(db, "users"), where("uid", "==", user.uid)));
            if (!usersByUid.empty && usersByUid.docs[0].data()?.role === 'admin') {
                return true;
            }

            if (user.email) {
                const usersByEmail = await getDocs(query(collection(db, "users"), where("email", "==", user.email)));
                if (!usersByEmail.empty && usersByEmail.docs[0].data()?.role === 'admin') {
                    return true;
                }
            }

            const savedUsername = (localStorage.getItem('twkt_username') || '').trim().toLowerCase();
            if (savedUsername) {
                const usersByUsername = await getDocs(query(collection(db, "users"), where("username", "==", savedUsername)));
                if (!usersByUsername.empty && usersByUsername.docs[0].data()?.role === 'admin') {
                    return true;
                }
            }

            return false;
        }

        async function saveConfig() {
            const saveBtn = document.getElementById('saveBtn');
            const statusText = document.getElementById('statusText');
            saveBtn.disabled = true;
            statusText.textContent = '儲存中...';
            statusText.className = 'status';
            try {
                await setDoc(configRef, {
                    version: Date.now(),
                    updatedAt: serverTimestamp(),
                    updatedBy: currentUser.uid,
                    items: localConfig
                }, { merge: true });
                statusText.textContent = '設定已儲存，問卷與結果頁會直接套用。';
                statusText.className = 'status success';
            } catch (error) {
                console.error('儲存題目設定失敗:', error);
                statusText.textContent = `儲存失敗：${error.message}`;
                statusText.className = 'status error';
            } finally {
                saveBtn.disabled = false;
            }
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex -= 1;
                renderQuestion();
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentIndex < questionsData.length - 1) {
                currentIndex += 1;
                renderQuestion();
            }
        });

        document.getElementById('saveBtn').addEventListener('click', saveConfig);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace('admin-login.html');
                return;
            }
            currentUser = user;
            const isAdmin = await ensureAdmin(user);
            if (!isAdmin) {
                window.location.replace('customer.html');
                return;
            }
            await loadSavedConfig();
            bindChoiceHandlers();
            renderQuestion();
        });
    </script>
</body>
</html>
