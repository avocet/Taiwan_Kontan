<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>每日飲食紀錄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #007AFF;
            --secondary-color: #5856D6;
            --background-color: #F2F2F7;
            --card-background: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #8E8E93;
            --border-color: #C6C6C8;
            --success-color: #34C759;
            --error-color: #FF3B30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #FF2D55, #FF6B6B);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .add-btn {
            background: white;
            color: #FF2D55;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
        }

        .add-btn:hover {
            background: #f5f5f5;
        }

        .content {
            padding: 20px;
        }

        #dataList {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 資料卡片 */
        .data-card {
            background: var(--card-background);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: block;
            width: min(720px, 100%);
        }

        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .data-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .data-date {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .edit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: none;
        }

        .edit-btn:hover {
            background: #0056b3;
        }

        .delete-btn {
            background: var(--error-color);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-left: 6px;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .data-photo {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
        }

        .data-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 0.8125rem;
            width: fit-content;
            max-width: 100%;
        }

        .data-item {
            display: flex;
            flex-direction: column;
        }

        .data-label {
            color: var(--text-secondary);
            font-size: 0.6875rem;
        }

        .data-value {
            font-weight: 500;
        }

        /* 載入中 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .data-photo {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            margin-left: 8px;
        }

        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .data-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 照片 Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        .records-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-top: 12px;
            width: 100%;
            justify-content: space-between;
        }

        .diet-records {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fafafa;
            width: fit-content;
            max-width: 100%;
        }

        .portion-section {
            padding: 10px 12px;
            border: 1px solid #dbeafe;
            border-radius: 12px;
            background: #f8fbff;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: fit-content;
            max-width: 100%;
            margin-left: auto;
        }

        .portion-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .portion-empty {
            background: #f7f7f9;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            display: inline-block;
            max-width: 100%;
            width: fit-content;
        }

        .portion-card {
            background: #ffffff;
            border: 1px solid #d9e9ff;
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: inline-block;
            max-width: 100%;
            width: fit-content;
        }

        .portion-period {
            font-size: 0.75rem;
            color: #1d4ed8;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .portion-row {
            display: flex;
            justify-content: flex-start;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 0.8125rem;
        }

        .portion-meal {
            color: #111827;
            font-weight: 600;
            white-space: nowrap;
        }

        .portion-values {
            color: #374151;
            font-variant-numeric: tabular-nums;
        }

        .portion-summary-row {
            align-items: flex-start;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed #dbeafe;
        }

        .portion-summary-value {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            text-align: right;
        }

        .portion-kcal-total {
            font-weight: 700;
            color: #1f2937;
        }

        .portion-kcal-breakdown {
            display: block;
            max-width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            text-align: left;
        }

        .portion-kcal-item {
            white-space: nowrap;
            display: inline-block;
            margin-left: 8px;
        }

        .portion-kcal-item:first-child {
            margin-left: 0;
        }

        .advice-section {
            margin-top: 10px;
            padding: 10px 12px;
            border: 1px solid #d1fae5;
            background: #ecfdf5;
            border-radius: 12px;
        }

        .advice-title {
            font-size: 0.75rem;
            color: #065f46;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .advice-content {
            font-size: 0.875rem;
            color: #064e3b;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .advice-actions {
            margin-top: 8px;
            display: flex;
            justify-content: flex-end;
        }

        .reply-btn {
            background: #0f766e;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .reply-btn:hover {
            background: #0d5e58;
        }

        .student-reply {
            margin-top: 8px;
            border: 1px solid #bfdbfe;
            background: #eff6ff;
            border-radius: 10px;
            padding: 8px 10px;
        }

        .student-reply-title {
            font-size: 0.75rem;
            color: #1e3a8a;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .student-reply-content {
            font-size: 0.875rem;
            color: #1e3a8a;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .dialog-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 2500;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .dialog-modal.show {
            display: flex;
        }

        .dialog-content {
            width: min(520px, 100%);
            background: #fff;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        }

        .dialog-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .chat-list {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            max-height: 300px;
            overflow-y: auto;
            background: #fafafa;
        }

        .chat-empty {
            color: #6b7280;
            font-size: 0.8125rem;
        }

        .chat-message {
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat-meta {
            font-size: 0.6875rem;
            color: #6b7280;
        }

        .chat-bubble {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 8px 10px;
            white-space: pre-wrap;
            line-height: 1.5;
            font-size: 0.875rem;
        }

        .chat-bubble.admin {
            background: #ecfdf5;
            border-color: #a7f3d0;
            color: #064e3b;
        }

        .chat-bubble.student {
            background: #eff6ff;
            border-color: #bfdbfe;
            color: #1e3a8a;
        }

        .reply-textarea {
            width: 100%;
            min-height: 92px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 10px;
            resize: vertical;
            font-size: 0.875rem;
            margin-bottom: 10px;
        }

        .dialog-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .dialog-btn {
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.8125rem;
        }

        .dialog-btn.cancel {
            background: #e5e7eb;
            color: #374151;
        }

        .dialog-btn.save {
            background: var(--primary-color);
            color: #fff;
        }

        @media screen and (max-width: 428px) {
            .header {
                padding: 16px;
                flex-wrap: wrap;
                gap: 12px;
            }
            
            .header h1 {
                font-size: 1rem;
            }

            .data-info {
                grid-template-columns: repeat(2, 1fr);
            }

            .records-row {
                flex-direction: column;
                align-items: stretch;
            }

            .diet-records,
            .portion-section {
                width: 100%;
            }

            .portion-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="customer.html" class="back-btn">← 返回</a>
            <h1>每日飲食紀錄</h1>
        </div>
        <a href="每日飲食紀錄新增.html" class="add-btn">+ 新增資料</a>
    </div>

    <div class="content">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>載入中...</p>
        </div>
        
        <div id="dataList"></div>
    </div>

    <!-- 照片 Modal -->
    <div class="modal" id="photoModal">
        <button class="modal-close" id="modalClose">&times;</button>
        <img class="modal-img" id="modalImg" src="" alt="照片">
    </div>

    <div class="dialog-modal" id="replyModal">
        <div class="dialog-content">
            <div class="dialog-title">回覆管理者營養師建議</div>
            <div class="chat-list" id="replyModalChatList"></div>
            <textarea class="reply-textarea" id="replyInput" placeholder="請輸入你的回覆..."></textarea>
            <div class="dialog-actions">
                <button class="dialog-btn cancel" id="cancelReplyBtn">取消</button>
                <button class="dialog-btn save" id="saveReplyBtn">送出回覆</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, orderBy, doc, getDoc, deleteDoc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getStorage, ref, deleteObject } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyK0sGYh_M-bJUE4NhZJxz5HkllW4jXxw",
            authDomain: "akso-weightcontroll.firebaseapp.com",
            projectId: "akso-weightcontroll",
            storageBucket: "akso-weightcontroll.firebasestorage.app",
            messagingSenderId: "523229071422",
            appId: "1:523229071422:web:c36fd110cc5812fea2a96f",
            measurementId: "G-DFEEKX4V0S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let replyingRecordId = '';
        let recordCache = new Map();
        let cachedAdminEmails = [];

        // 檢查登入狀態
        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace('login.html');
                return;
            }
            currentUser = user;
            const adminDoc = await getDoc(doc(db, "管理員", user.uid));
            if (adminDoc.exists() && adminDoc.data().role === 'admin') {
                await signOut(auth);
                window.location.replace('index.html');
                return;
            }
            
            // 載入資料
            await loadAdminEmails();
            loadData(user.uid);
        });

        // 每次頁面顯示時都檢查
        window.onpageshow = function(event) {
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    window.location.replace('login.html');
                } else {
                    const adminDoc = await getDoc(doc(db, "管理員", user.uid));
                    if (adminDoc.exists() && adminDoc.data().role === 'admin') {
                        await signOut(auth);
                        window.location.replace('index.html');
                    }
                }
            });
        };

        // 載入資料
        async function loadAdminEmails() {
            try {
                const adminUsersQ = query(collection(db, "users"), where("role", "==", "admin"));
                const adminUsersSnapshot = await getDocs(adminUsersQ);
                cachedAdminEmails = adminUsersSnapshot.docs
                    .map((docSnap) => (docSnap.data().email || '').trim())
                    .filter(Boolean);
            } catch (error) {
                console.error('載入管理員 email 失敗:', error);
                cachedAdminEmails = [];
            }
        }

        async function queueEmailNotificationToAdmins(recordData, messageText) {
            if (!cachedAdminEmails.length) return;
            const recordDate = recordData?.紀錄日期 || '-';
            const subject = `【體重管理班】學員有新回覆 (${recordDate})`;
            const senderName = localStorage.getItem('twkt_username') || (currentUser?.email || '學員');
            const html = `
                <div style="font-family:Arial,'PingFang TC','Microsoft JhengHei',sans-serif;line-height:1.6;">
                    <h3 style="margin:0 0 8px;">學員有新的對話訊息</h3>
                    <p style="margin:0 0 8px;">紀錄日期：${recordDate}</p>
                    <p style="margin:0 0 8px;">發送者：${senderName}</p>
                    <p style="margin:0 0 8px;">訊息內容：</p>
                    <blockquote style="margin:0;padding:8px 10px;background:#f3f4f6;border-left:4px solid #9ca3af;white-space:pre-wrap;">${String(messageText || '')
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')}</blockquote>
                </div>
            `;
            const text = `學員有新的對話訊息\n紀錄日期：${recordDate}\n發送者：${senderName}\n訊息內容：${messageText}`;

            await addDoc(collection(db, "emailNotifications"), {
                to: cachedAdminEmails,
                message: { subject, text, html },
                createdAt: new Date(),
                source: "student-chat-reply"
            });
        }

        async function loadData(userId) {
            try {
                const q = query(
                    collection(db, "每日體重三圍"),
                    where("userId", "==", userId)
                );
                const portionQ = query(
                    collection(db, "飲食份數表"),
                    where("userId", "==", userId)
                );

                const [querySnapshot, portionSnapshot] = await Promise.all([getDocs(q), getDocs(portionQ)]);
                const portionRecords = portionSnapshot.docs.map((docSnap) => ({
                    id: docSnap.id,
                    ...docSnap.data()
                })).sort((a, b) => {
                    const dateA = a.紀錄日期 || '';
                    const dateB = b.紀錄日期 || '';
                    return dateB.localeCompare(dateA);
                });
                
                document.getElementById('loading').style.display = 'none';
                
                if (querySnapshot.empty) {
                    document.getElementById('dataList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">⚖️</div>
                            <p>尚無資料</p>
                            <p style="font-size: 0.8125rem; margin-top: 8px;">點擊右上角「+ 新增資料」開始記錄</p>
                        </div>
                    `;
                    return;
                }
                
                // 轉為陣列並用 JavaScript 排序
                let docsArray = [];
                querySnapshot.forEach((doc) => {
                    docsArray.push({ id: doc.id, data: doc.data() });
                });
                
                docsArray.sort((a, b) => {
                    const dateA = a.data.紀錄日期 || '';
                    const dateB = b.data.紀錄日期 || '';
                    return dateB.localeCompare(dateA);
                });
                
                let html = '';
                recordCache = new Map();
                docsArray.forEach((item) => {
                    recordCache.set(item.id, item.data);
                    html += createDataCard(item.data, item.id, portionRecords);
                });
                document.getElementById('dataList').innerHTML = html;
                
            } catch (error) {
                console.error('載入資料失敗:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dataList').innerHTML = `
                    <div class="empty-state">
                        <p>載入失敗</p>
                        <p style="font-size: 0.8125rem; margin-top: 8px; color: var(--error-color);">${error.message}</p>
                    </div>
                `;
            }
        }

        // 建立資料卡片
        function createDataCard(data, docId, portionRecords = []) {
            const escapeHtml = (value) => String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            const buildPortionSummaryHtml = (portion) => {
                const totals = { C: 0, P: 0, F: 0, V: 0 };
                const kcalRates = { C: 70, P: 75, F: 60, V: 25 };
                meals.forEach((meal) => {
                    Object.keys(totals).forEach((nutrient) => {
                        totals[nutrient] += Number(portion[`${meal}${nutrient}`] || 0);
                    });
                });
                const totalKcal = Object.keys(totals).reduce((sum, nutrient) => sum + totals[nutrient] * kcalRates[nutrient], 0);
                const kcalText = Object.keys(totals).map((nutrient) => {
                    const kcal = totals[nutrient] * kcalRates[nutrient];
                    const percent = totalKcal > 0 ? Math.round((kcal / totalKcal) * 100) : 0;
                    return `<span class="portion-kcal-item">${nutrient}:${kcal} (${percent}%)</span>`;
                }).join(' ');
                return `
                    <div class="portion-row portion-summary-row"><span class="portion-meal">Total</span><span class="portion-values">C:${totals.C} P:${totals.P} F:${totals.F} V:${totals.V}</span></div>
                    <div class="portion-row"><span class="portion-meal">Kcal</span><span class="portion-values portion-summary-value"><span class="portion-kcal-total">總熱量 ${totalKcal}</span><span class="portion-kcal-breakdown">${kcalText}</span></span></div>
                `;
            };
            const conversation = normalizeConversation(data);
            const date = data.紀錄日期 || '-';
            const matchedPortions = portionRecords.filter((portion) => {
                const startDate = portion.紀錄日期 || '';
                const endDate = portion.結束日期 || startDate;
                return date >= startDate && date <= endDate;
            });
            
            let photoHtml = '';
            if (data.照片) {
                if (Array.isArray(data.照片)) {
                    data.照片.forEach(photoUrl => {
                        photoHtml += `<img class="data-photo" src="${photoUrl}" onclick="showPhoto('${photoUrl}')" alt="照片">`;
                    });
                } else {
                    photoHtml = `<img class="data-photo" src="${data.照片}" onclick="showPhoto('${data.照片}')" alt="照片">`;
                }
            }

            const meals = ['早餐', '早點', '午餐', '午茶', '晚餐', '宵夜'];
            const mealEntries = meals.map((meal) => ({
                label: meal,
                time: data[`${meal}時間`] || '',
                value: data[meal] || ''
            }));
            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                const d = new Date(dateStr);
                return `${d.getMonth() + 1}/${d.getDate()}`;
            };

            let portionHtml = '<div class="portion-section">';
            portionHtml += '<div class="portion-title">管理員飲食份數表</div>';

            if (matchedPortions.length === 0) {
                portionHtml += '<div class="portion-empty">此日期沒有設定飲食份數表</div>';
            } else {
                matchedPortions.forEach((portion) => {
                    const startDate = portion.紀錄日期 || '-';
                    const endDate = portion.結束日期 || startDate;
                    portionHtml += `<div class="portion-card"><div class="portion-period">期間：${formatDate(startDate)} 到 ${formatDate(endDate)}</div>`;
                    meals.forEach((meal) => {
                        const time = portion[`${meal}時間`] || '';
                        const c = portion[`${meal}C`] || 0;
                        const p = portion[`${meal}P`] || 0;
                        const f = portion[`${meal}F`] || 0;
                        const v = portion[`${meal}V`] || 0;
                        portionHtml += `<div class="portion-row"><span class="portion-meal">${meal}${time ? ' ' + time : ''}</span><span class="portion-values">C:${c} P:${p} F:${f} V:${v}</span></div>`;
                    });
                    portionHtml += buildPortionSummaryHtml(portion);
                    portionHtml += '</div>';
                });
            }
            portionHtml += '</div>';

            const hasAdminAdvice = conversation.some((msg) => msg.role === 'admin') || !!data.管理員建議;
            const latestStudentReply = [...conversation].reverse().find((msg) => msg.role === 'student');
            const adviceHtml = hasAdminAdvice
                ? `
                    <div class="advice-section">
                        <div class="advice-title">管理者營養師建議對話</div>
                        <div class="advice-content">共 ${conversation.length} 則訊息，可持續回覆</div>
                        ${latestStudentReply ? `<div class="student-reply"><div class="student-reply-title">你最近的回覆</div><div class="student-reply-content">${escapeHtml(latestStudentReply.text)}</div></div>` : ''}
                        <div class="advice-actions">
                            <button class="reply-btn" data-record-id="${docId}">開啟對話</button>
                        </div>
                    </div>
                `
                : '';
            
            return `
                <div class="data-card">
                    <div class="data-header">
                        <div class="data-header-left">
                            <span class="data-date">${date}</span>
                            <button class="edit-btn" onclick="editData('${docId}')">編輯</button>
                            <button class="delete-btn" onclick="deleteData('${docId}')">刪除</button>
                        </div>
                        ${photoHtml}
                    </div>
                    <div class="data-info">
                        <div class="data-item">
                            <span class="data-label">體重</span>
                            <span class="data-value">${data.體重 || '-'} kg</span>
                        </div>
                        <div class="data-item">
                            <span class="data-label">體脂</span>
                            <span class="data-value">${data.體脂 || '-'} %</span>
                        </div>
                        <div class="data-item">
                            <span class="data-label">水</span>
                            <span class="data-value">${data.喝水量 || '-'} cc / 天</span>
                        </div>
                        <div class="data-item">
                            <span class="data-label">排便與否</span>
                            <span class="data-value">${Array.isArray(data.排便與否) ? (data.排便與否[0] || '-') : (data.排便與否 || '-')}</span>
                        </div>
                        <div class="data-item">
                            <span class="data-label">排便狀況</span>
                            <span class="data-value">${Array.isArray(data.排便狀況) && data.排便狀況.length ? data.排便狀況.join('、') : '-'}</span>
                        </div>
                    </div>
                    <div class="records-row">
                        <div class="diet-records">
                            ${mealEntries.map((meal) => `
                                <div class="data-item" style="margin-bottom:8px;">
                                    <span class="data-label">${meal.label}${meal.time ? ` ${meal.time}` : ''}</span>
                                    <span class="data-value">${meal.value || '-'}</span>
                                </div>
                            `).join('')}
                            ${data.備註 ? `<div class="data-item"><span class="data-label">備註</span><span class="data-value">${data.備註}</span></div>` : ''}
                            ${adviceHtml}
                        </div>
                        ${portionHtml}
                    </div>
                </div>
            `;
        }

        // 顯示照片
        window.showPhoto = function(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('photoModal').classList.add('show');
        };

        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('photoModal').classList.remove('show');
        });

        document.getElementById('photoModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('photoModal')) {
                document.getElementById('photoModal').classList.remove('show');
            }
        });

        document.getElementById('dataList').addEventListener('click', (e) => {
            const btn = e.target.closest('.reply-btn');
            if (!btn) return;
            openReplyDialog(btn.getAttribute('data-record-id') || '');
        });

        window.editData = function(docId) {
            window.location.href = `每日飲食紀錄編輯.html?id=${docId}`;
        };

        window.deleteData = async function(docId) {
            if (!confirm('確定要刪除這筆資料嗎？此操作無法復原。')) {
                return;
            }
            
            try {
                // 取得文件資料以刪除照片
                const docSnap = await getDoc(doc(db, "每日體重三圍", docId));
                if (docSnap.exists() && docSnap.data().照片) {
                    const photos = docSnap.data().照片;
                    const photoArray = Array.isArray(photos) ? photos : [photos];
                    
                    // 刪除每張照片
                    for (const photoUrl of photoArray) {
                        try {
                            const photoRef = ref(storage, photoUrl);
                            await deleteObject(photoRef);
                        } catch (e) {
                            console.log('刪除照片失敗:', e);
                        }
                    }
                }
                
                await deleteDoc(doc(db, "每日體重三圍", docId));
                alert('資料已刪除');
                loadData(currentUser.uid);
            } catch (error) {
                console.error('刪除失敗:', error);
                alert('刪除失敗: ' + error.message);
            }
        };

        function toMillis(value) {
            if (!value) return 0;
            if (typeof value === 'string') {
                const n = Date.parse(value);
                return Number.isNaN(n) ? 0 : n;
            }
            if (typeof value?.toMillis === 'function') return value.toMillis();
            if (typeof value?.seconds === 'number') return value.seconds * 1000;
            const n = Date.parse(String(value));
            return Number.isNaN(n) ? 0 : n;
        }

        function normalizeConversation(recordData = {}) {
            const chat = Array.isArray(recordData.建議對話) ? recordData.建議對話 : [];
            const normalized = chat
                .map((item) => ({
                    role: item?.role === 'student' ? 'student' : 'admin',
                    text: String(item?.text || '').trim(),
                    createdAt: item?.createdAt || ''
                }))
                .filter((item) => item.text);

            if (normalized.length === 0) {
                if (recordData.管理員建議) {
                    normalized.push({ role: 'admin', text: String(recordData.管理員建議), createdAt: recordData.建議更新時間 || '' });
                }
                if (recordData.學員回覆) {
                    normalized.push({ role: 'student', text: String(recordData.學員回覆), createdAt: recordData.學員回覆更新時間 || '' });
                }
            }
            return normalized.sort((a, b) => toMillis(a.createdAt) - toMillis(b.createdAt));
        }

        function formatChatTime(value) {
            const ms = toMillis(value);
            if (!ms) return '';
            const d = new Date(ms);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return `${y}/${m}/${day} ${hh}:${mm}`;
        }

        function renderReplyModalConversation(conversation = []) {
            const container = document.getElementById('replyModalChatList');
            if (!conversation.length) {
                container.innerHTML = '<div class="chat-empty">目前尚無建議內容</div>';
                return;
            }
            container.innerHTML = conversation.map((msg) => `
                <div class="chat-message">
                    <div class="chat-meta">${msg.role === 'admin' ? '管理者營養師' : '你'} ${formatChatTime(msg.createdAt)}</div>
                    <div class="chat-bubble ${msg.role === 'admin' ? 'admin' : 'student'}">${String(msg.text)
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        window.openReplyDialog = function(recordId) {
            replyingRecordId = recordId;
            const recordData = recordCache.get(recordId) || {};
            const conversation = normalizeConversation(recordData);
            renderReplyModalConversation(conversation);
            document.getElementById('replyInput').value = '';
            document.getElementById('replyModal').classList.add('show');
        };

        function closeReplyDialog() {
            replyingRecordId = '';
            document.getElementById('replyModal').classList.remove('show');
        }

        document.getElementById('cancelReplyBtn').addEventListener('click', closeReplyDialog);
        document.getElementById('replyModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('replyModal')) {
                closeReplyDialog();
            }
        });

        document.getElementById('saveReplyBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveReplyBtn');
            const replyText = document.getElementById('replyInput').value.trim();
            if (!replyingRecordId || !replyText) return;
            btn.disabled = true;
            btn.textContent = '送出中...';
            try {
                const recordData = recordCache.get(replyingRecordId) || {};
                const conversation = normalizeConversation(recordData);
                const nextConversation = [...conversation, {
                    role: 'student',
                    text: replyText,
                    createdAt: new Date().toISOString()
                }];
                await updateDoc(doc(db, "每日體重三圍", replyingRecordId), {
                    建議對話: nextConversation,
                    學員回覆: replyText,
                    學員回覆更新時間: new Date()
                });
                try {
                    await queueEmailNotificationToAdmins(recordData, replyText);
                } catch (mailError) {
                    console.error('寄送通知信失敗:', mailError);
                }
                recordCache.set(replyingRecordId, {
                    ...recordData,
                    建議對話: nextConversation,
                    學員回覆: replyText,
                    學員回覆更新時間: new Date().toISOString()
                });
                renderReplyModalConversation(nextConversation);
                document.getElementById('replyInput').value = '';
                await loadData(currentUser.uid);
            } catch (error) {
                console.error('送出回覆失敗:', error);
                alert('送出回覆失敗，請稍後再試');
            } finally {
                btn.disabled = false;
                btn.textContent = '送出回覆';
            }
        });
    </script>
</body>
</html>
