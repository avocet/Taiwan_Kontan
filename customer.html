<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>體重管理班</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #007AFF;
            --secondary-color: #5856D6;
            --background-color: #F2F2F7;
            --card-background: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            text-decoration: none;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 30px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .menu-card {
            background: var(--card-background);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0, 122, 255, 0.2);
        }

        .menu-card:nth-child(1) .menu-icon { background: linear-gradient(135deg, #007AFF, #5856D6); }
        .menu-card:nth-child(2) .menu-icon { background: linear-gradient(135deg, #FF9500, #FF3B30); }
        .menu-card:nth-child(3) .menu-icon { background: linear-gradient(135deg, #34C759, #30D158); }
        .menu-card:nth-child(4) .menu-icon { background: linear-gradient(135deg, #FF2D55, #FF6B6B); }
        .menu-card:nth-child(5) .menu-icon { background: linear-gradient(135deg, #5856D6, #AF52DE); }

        .menu-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .menu-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .menu-desc {
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        @media screen and (max-width: 768px) {
            #desktopRecordsContainer { display: none !important; }
            #mobileRecordsContent { display: block !important; }
            #studentRecords { max-width: 600px; }
        }
        
        @media screen and (min-width: 769px) {
            #desktopRecordsContainer { display: flex !important; }
            #mobileRecordsContent { display: none !important; }
            #showPortionTableBtn { display: block; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="pageTitle">體重管理班</h1>
        <a href="index.html" class="logout-btn" id="logoutBtn">登出</a>
    </div>

    <!-- 學員列表（管理員用） -->
    <div id="studentList" style="display:none;padding:20px;max-width:600px;margin:0 auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="font-size:1.25rem;">學員列表</h2>
            <button id="addStudentBtn" style="background:#007AFF;color:white;border:none;padding:10px 20px;border-radius:8px;font-size:0.875rem;cursor:pointer;">+ 新增學員</button>
        </div>
        <div id="studentListContent"></div>
    </div>

    <!-- 學員每日飲食紀錄（管理員用） -->
    <div id="studentRecords" style="display:none;padding:20px;max-width:1200px;margin:0 auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <button id="backToListBtn" style="background:none;border:none;font-size:1rem;cursor:pointer;padding:8px;">← 返回</button>
            <h2 id="studentNameTitle" style="font-size:1.25rem;flex:1;text-align:center;margin-right:60px;">學員飲食紀錄</h2>
            <button id="showPortionTableBtn" style="background:#34C759;color:white;border:none;padding:8px 16px;border-radius:8px;font-size:0.875rem;cursor:pointer;white-space:nowrap;">📊 飲食份數表</button>
        </div>
        
        <!-- 電腦版：並排顯示 -->
        <div id="desktopRecordsContainer" style="display:none;gap:20px;justify-content:center;">
            <div style="width:400px;">
                <h3 style="font-size:1rem;margin-bottom:12px;">每日飲食紀錄</h3>
                <div id="leftAlignedDisplay"></div>
            </div>
            <div style="width:auto;">
                <h3 style="font-size:1rem;margin-bottom:12px;">飲食份數表</h3>
                <div id="rightAlignedDisplay"></div>
            </div>
        </div>
        
        <!-- 手機版 -->
        <div id="mobileRecordsContent"></div>
    </div>

    <!-- 照片 Modal -->
    <div id="photoModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;align-items:center;justify-content:center;">
        <img id="modalImg" style="max-width:90%;max-height:90%;border-radius:8px;">
        <button onclick="document.getElementById('photoModal').style.display='none'" style="position:absolute;top:20px;right:20px;background:none;border:none;color:white;font-size:2rem;cursor:pointer;">✕</button>
    </div>

    <!-- 飲食份數表 Modal (輸入) -->
    <div id="portionTableModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:white;padding:24px;border-radius:16px;width:95%;max-width:800px;max-height:90vh;overflow-y:auto;margin:20px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3 style="font-size:1.125rem;">飲食份數表 - 輸入</h3>
                <button id="closePortionTableBtn" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">✕</button>
            </div>
            <div style="margin-bottom:16px;padding:12px;background:#f5f5f5;border-radius:8px;">
                <label style="display:block;font-size:0.875rem;color:#666;margin-bottom:8px;">選擇日期範圍</label>
                <div style="display:flex;gap:10px;align-items:center;">
                    <input type="date" id="portionStartDate" style="padding:8px;border:1px solid #ddd;border-radius:8px;font-size:0.875rem;">
                    <span>至</span>
                    <input type="date" id="portionEndDate" style="padding:8px;border:1px solid #ddd;border-radius:8px;font-size:0.875rem;">
                </div>
            </div>
            <form id="portionTableForm">

                    <tr style="background:#007AFF;color:white;">
                        <th style="padding:8px;border:1px solid #ddd;text-align:center;">餐別</th>

                        <th style="padding:8px;border:1px solid #ddd;text-align:center;">P<br>蛋白質</th>
                        <th style="padding:8px;border:1px solid #ddd;text-align:center;">F<br>脂肪</th>
                        <th style="padding:8px;border:1px solid #ddd;text-align:center;">V<br>蔬菜</th>
                    </tr>
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">早餐</td>
                        <td style="padding:8px;border:1px solid #ddd;"><input type="time" name="早餐時間" style="width:100px;padding:4px;border:1px solid #ddd;border-radius:4px;"></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早餐C" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早餐P" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早餐F" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早餐V" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                    </tr>
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">早點</td>
                        <td style="padding:8px;border:1px solid #ddd;"><input type="time" name="早點時間" style="width:100px;padding:4px;border:1px solid #ddd;border-radius:4px;"></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早點C" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早點P" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早點F" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早點V" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                    </tr>
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">午餐</td>
                        <td style="padding:8px;border:1px solid #ddd;"><input type="time" name="午餐時間" style="width:100px;padding:4px;border:1px solid #ddd;border-radius:4px;"></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午餐C" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午餐P" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午餐F" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午餐V" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                    </tr>
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">午茶</td>
                        <td style="padding:8px;border:1px solid #ddd;"><input type="time" name="午茶時間" style="width:100px;padding:4px;border:1px solid #ddd;border-radius:4px;"></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午茶C" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午茶P" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午茶F" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午茶V" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                    </tr>
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">晚餐</td>
                        <td style="padding:8px;border:1px solid #ddd;"><input type="time" name="晚餐時間" style="width:100px;padding:4px;border:1px solid #ddd;border-radius:4px;"></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="晚餐C" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="晚餐P" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="晚餐F" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="晚餐V" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                    </tr>
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">宵夜</td>
                        <td style="padding:8px;border:1px solid #ddd;"><input type="time" name="宵夜時間" style="width:100px;padding:4px;border:1px solid #ddd;border-radius:4px;"></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="宵夜C" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="宵夜P" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="宵夜F" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="宵夜V" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                    </tr>
                </table>
                <div style="margin-top:16px;text-align:right;">
                    <button type="submit" style="background:#007AFF;color:white;padding:10px 24px;border:none;border-radius:8px;font-size:0.875rem;cursor:pointer;">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 新增學員 Modal -->
    <div id="addStudentModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:white;padding:24px;border-radius:16px;width:90%;max-width:400px;margin:20px;">
            <h3 style="margin-bottom:16px;font-size:1.125rem;">新增學員</h3>
            <form id="addStudentForm">
                <div style="margin-bottom:12px;">
                    <label style="display:block;margin-bottom:4px;font-size:0.875rem;color:#666;">使用者名稱</label>
                    <input type="text" id="newUsername" required style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:1rem;">
                </div>
                <div style="margin-bottom:12px;">
                    <label style="display:block;margin-bottom:4px;font-size:0.875rem;color:#666;">電子郵件</label>
                    <input type="email" id="newEmail" required style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:1rem;">
                </div>
                <div style="margin-bottom:12px;">
                    <label style="display:block;margin-bottom:4px;font-size:0.875rem;color:#666;">密碼</label>

        // 載入學員列表
        async function loadStudentList() {
            const content = document.getElementById('studentListContent');
            content.innerHTML = '<p>載入中...</p>';
            
            try {
                console.log('Loading student list...');
                const usersQuery = query(collection(db, "users"), where("role", "==", "customer"));
                const usersSnapshot = await getDocs(usersQuery);
                console.log('usersSnapshot size:', usersSnapshot.size);
                
                if (usersSnapshot.empty) {
                    content.innerHTML = '<p>目前沒有學員</p>';
                    return;
                }
                
                let html = '<div style="display:flex;flex-direction:column;gap:12px;">';
                
                for (const doc of usersSnapshot.docs) {
                    const userData = doc.data();
                    console.log('userData:', userData);
                    
                    const username = userData.username || userData.email?.split('@')[0] || '-';
                    if (username === '-') continue;
                    
                    // 嘗試用 username 查詢客戶資料
                    const customerQuery = query(collection(db, "客戶資料"), where("userId", "==", username));
                    const customerSnapshot = await getDocs(customerQuery);
                    const studentName = customerSnapshot.empty ? username : (customerSnapshot.docs[0].data().姓名 || username);

                        <div onclick="viewStudentRecords('${userData.username}', '${studentName}')" style="background:white;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);cursor:pointer;">

        let currentStudentUsername = null;
        let currentStudentName = null;
        let currentStudentUid = null;

        // 查看學員飲食紀錄
        window.viewStudentRecords = async function(username, name) {
            currentStudentUsername = username;
            currentStudentName = name;
            
            const studentList = document.getElementById('studentList');
            const studentRecords = document.getElementById('studentRecords');
            const recordsContent = document.getElementById('studentRecordsContent');
            const mobileRecordsContent = document.getElementById('mobileRecordsContent');
            const studentNameTitle = document.getElementById('studentNameTitle');
            
            studentList.style.display = 'none';
            studentRecords.style.display = 'block';
            studentNameTitle.textContent = name + ' 的飲食紀錄';
            recordsContent.innerHTML = '<p>載入中...</p>';
            mobileRecordsContent.innerHTML = '<p>載入中...</p>';
            
            try {
                console.log('Querying for name:', name);
                
                // 先取得學員的 uid
                const userQuery = query(collection(db, "users"), where("username", "==", username));
                const userSnapshot = await getDocs(userQuery);
                
                if (userSnapshot.empty) {
                    recordsContent.innerHTML = '<p>找不到學員資料</p>';
                    return;
                }
                
                const userData = userSnapshot.docs[0].data();
                const userUid = userData.uid || userData.email?.split('@')[0];
                
                if (!userUid) {
                    recordsContent.innerHTML = '<p>找不到學員 UID</p>';
                    return;
                }
                
                currentStudentUid = userUid;
                console.log('userUid:', userUid);
                
                // 用 uid 查詢學員的飲食紀錄
                const recordsQuery = query(collection(db, "每日體重三圍"), where("userId", "==", userUid));
                const recordsSnapshot = await getDocs(recordsQuery);
                console.log('recordsSnapshot size:', recordsSnapshot.size);
                
                if (recordsSnapshot.empty) {
                    recordsContent.innerHTML = '<p>目前沒有飲食紀錄</p>';
                    return;
                }
                
                // 按日期排序
                const records = recordsSnapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                })).sort((a, b) => new Date(b.紀錄日期) - new Date(a.紀錄日期));
                
                // 取得最新日期
                const latestDate = records.length > 0 ? records[0].紀錄日期 : null;
                
                let html = '<div style="display:flex;flex-direction:column;gap:12px;">';
                
                for (const record of records) {
                    const date = record.紀錄日期 || '-';
                    const weight = record.體重 || '-';
                    const bodyFat = record.體脂 || '-';
                    const breakfast = record.早餐 || '-';
                    const lunch = record.午餐 || '-';
                    const dinner = record.晚餐 || '-';
                    
                    // 處理照片
                    let photosHtml = '';
                    if (record.照片) {
                        const photos = Array.isArray(record.照片) ? record.照片 : [record.照片];
                        photosHtml = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;">';
                        photos.forEach(photoUrl => {
                            photosHtml += `<img src="${photoUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;cursor:pointer;" onclick="showPhoto('${photoUrl}')">`;
                        });
                        photosHtml += '</div>';
                    }
                    
                    html += `
                        <div style="background:white;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                            <div style="font-weight:600;margin-bottom:8px;">${date}</div>
                            <div style="display:flex;gap:16px;margin-bottom:8px;font-size:0.875rem;color:#666;">
                                <span>體重: ${weight} kg</span>
                                <span>體脂: ${bodyFat}%</span>
                            </div>
                            <div style="font-size:0.875rem;color:#666;">
                                <div>早餐: ${breakfast}</div>
                                <div>午餐: ${lunch}</div>
                                <div>晚餐: ${dinner}</div>
                            </div>
                            ${photosHtml}
                        </div>
                    `;
                }
                
                html += '</div>';
                recordsContent.innerHTML = html;
                mobileRecordsContent.innerHTML = html;
                
                // 設定電腦版日期預設值
                const today = new Date().toISOString().split('T')[0];
                const weekAgo = new Date();
                weekAgo.setDate(weekAgo.getDate() - 7);
                const startDateStr = weekAgo.toISOString().split('T')[0];
                
                // 自動載入對齊顯示（電腦版）
                if (document.getElementById('leftAlignedDisplay')) {
                    const startDateEl = document.getElementById('portionStartDate2');
                    const endDateEl = document.getElementById('portionEndDate2');
                    if (startDateEl && endDateEl) {
                        startDateEl.value = startDateStr;
                        endDateEl.value = today;
                    }
                    loadAlignedRecords();
                }
                
            } catch (error) {
                console.error('載入學員紀錄失敗:', error);
                recordsContent.innerHTML = '<p>載入失敗</p>';
                mobileRecordsContent.innerHTML = '<p>載入失敗</p>';
            }
        };

        // 對齊顯示每日飲食紀錄和飲食份數表
        async function loadAlignedRecords() {
            if (!currentStudentUid) return;
            
            const leftDiv = document.getElementById('leftAlignedDisplay');
            const rightDiv = document.getElementById('rightAlignedDisplay');
            
            if (!leftDiv || !rightDiv) return;
            
            leftDiv.innerHTML = '<p style="text-align:center;">載入中...</p>';
            rightDiv.innerHTML = '<p style="text-align:center;">載入中...</p>';
            
            try {
                // 取得每日飲食紀錄
                const dietQuery = query(collection(db, "每日體重三圍"), where("userId", "==", currentStudentUid));
                const dietSnapshot = await getDocs(dietQuery);
                
                const dietRecords = [];
                dietSnapshot.forEach(doc => {
                    dietRecords.push(doc.data());
                });
                dietRecords.sort((a, b) => new Date(b.紀錄日期) - new Date(a.紀錄日期));
                
                const latestDate = dietRecords.length > 0 ? dietRecords[0].紀錄日期 : null;
                
                // 取得飲食份數表
                const portionQuery = query(collection(db, "飲食份數表"), where("userId", "==", currentStudentUid));
                const portionSnapshot = await getDocs(portionQuery);
                
                const portionRecords = [];
                portionSnapshot.forEach(doc => {
                    portionRecords.push(doc.data());
                });
                portionRecords.sort((a, b) => new Date(b.紀錄日期) - new Date(a.紀錄日期));
                
                const meals = ['早餐', '早點', '午餐', '午茶', '晚餐', '宵夜'];
                
                let leftHtml = '<div style="display:flex;flex-direction:column;gap:12px;">';
                let rightHtml = '<div style="display:flex;flex-direction:column;gap:12px;">';
                
                // 為每筆飲食份數表建立對齊的兩欄
                for (const portion of portionRecords) {
                    const startDate = portion.紀錄日期;
                    const endDate = portion.結束日期 || startDate;
                    
                    // 檢查最新日期是否在此期間
                    const isMatch = latestDate ? (latestDate >= startDate && latestDate <= endDate) : false;
                    
                    // 格式化日期
                    const formatDate = (dateStr) => {
                        if (!dateStr) return '-';
                        const d = new Date(dateStr);
                        return `${d.getMonth() + 1}/${d.getDate()}`;
                    };
                    
                    const periodStr = `${formatDate(startDate)} 到 ${formatDate(endDate)}`;
                    
                    // 左邊：每日飲食紀錄
                    if (isMatch && dietRecords.length > 0) {
                        const daily = dietRecords[0];
                        leftHtml += `
                            <div style="background:white;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                                <div style="font-weight:600;margin-bottom:8px;">${daily.紀錄日期}</div>
                                <div style="font-size:0.8rem;">
                                    <div>體重: ${daily.體重 || '-'} kg</div>
                                    <div>體脂: ${daily.體脂 || '-'}%</div>
                                    <div>早餐: ${daily.早餐 || '-'}</div>
                                    <div>午餐: ${daily.午餐 || '-'}</div>
                                    <div>晚餐: ${daily.晚餐 || '-'}</div>
                                </div>
                            </div>
                        `;
                    } else {
                        // 顯示空白卡片
                        leftHtml += `
                            <div style="background:white;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);min-height:100px;">
                            </div>
                        `;
                    }
                    
                    // 右邊：飲食份數表內容
                    let portionHtml = '';
                    for (const meal of meals) {
                        const time = portion[`${meal}時間`] || '';
                        const c = portion[`${meal}C`] || 0;
                        const p = portion[`${meal}P`] || 0;
                        const f = portion[`${meal}F`] || 0;
                        const v = portion[`${meal}V`] || 0;
                        portionHtml += `<div style="font-size:0.8rem;margin-top:4px;"><strong>${meal}${time ? ' ' + time : ''}:</strong> C:${c} P:${p} F:${f} V:${v}</div>`;
                    }
                    
                    rightHtml += `
                        <div style="background:white;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                            <div style="font-weight:600;margin-bottom:8px;">期間：${periodStr}</div>
                            ${portionHtml}
                        </div>
                    `;
                }
                
                leftHtml += '</div>';
                rightHtml += '</div>';
                
                leftDiv.innerHTML = leftHtml;
                rightDiv.innerHTML = rightHtml;
                
            } catch (error) {
                console.error('載入失敗:', error);
                leftDiv.innerHTML = '<p style="text-align:center;color:red;">載入失敗</p>';
                rightDiv.innerHTML = '<p style="text-align:center;color:red;">載入失敗</p>';
            }
        }

        // 自動載入飲食份數表
        async function loadPortionTable(latestDate) {
            if (!currentStudentUid) return;
            
            const displayDiv = document.getElementById('portionTableDisplay');
            if (!displayDiv) return;
            
            displayDiv.innerHTML = '<p style="text-align:center;">載入中...</p>';
            
            try {
                const q = query(
                    collection(db, "飲食份數表"),
                    where("userId", "==", currentStudentUid)
                );
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    displayDiv.innerHTML = '<p style="text-align:center;color:#999;">沒有資料</p>';
                    return;
                }
                
                const records = [];
                snapshot.forEach(doc => {
                    records.push(doc.data());
                });
                
                // 全部顯示，標記是否符合最新日期期間
                const processedRecords = records.map(r => {
                    const start = r.紀錄日期;
                    const end = r.結束日期 || start;
                    const isMatch = latestDate ? (latestDate >= start && latestDate <= end) : false;
                    return { ...r, _hasData: isMatch };
                });
                
                processedRecords.sort((a, b) => new Date(b.紀錄日期) - new Date(a.紀錄日期));
                
                const meals = ['早餐', '早點', '午餐', '午茶', '晚餐', '宵夜'];
                
                let html = '<div style="display:flex;flex-direction:column;gap:12px;">';
                
                for (const record of processedRecords) {
                    const startDate = record.紀錄日期 || '-';
                    const endDate = record.結束日期 || startDate;
                    
                    // 格式化日期顯示為 月/日
                    const formatDate = (dateStr) => {
                        if (!dateStr) return '-';
                        const d = new Date(dateStr);
                        return `${d.getMonth() + 1}/${d.getDate()}`;
                    };
                    
                    const periodStr = `${formatDate(startDate)} 到 ${formatDate(endDate)}`;
                    
                    // 飲食份數表內容
                    let mealsHtml = '';
                    for (const meal of meals) {
                        const time = record[`${meal}時間`] || '';
                        const c = record[`${meal}C`] || 0;
                        const p = record[`${meal}P`] || 0;
                        const f = record[`${meal}F`] || 0;
                        const v = record[`${meal}V`] || 0;
                        mealsHtml += `<div style="font-size:0.8rem;margin-top:4px;"><strong>${meal}${time ? ' ' + time : ''}:</strong> C:${c} P:${p} F:${f} V:${v}</div>`;
                    }
                    
                    html += `
                        <div style="background:white;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                            <div style="font-weight:600;margin-bottom:8px;">期間：${periodStr}</div>
                            ${mealsHtml}
                        </div>
                    `;
                }
                
                html += '</div>';
                displayDiv.innerHTML = html;
                
            } catch (error) {
                console.error('載入飲食份數表失敗:', error);
                displayDiv.innerHTML = '<p style="text-align:center;color:red;">載入失敗</p>';
            }
        }

        // 顯示照片
        window.showPhoto = function(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('photoModal').style.display = 'flex';
        };

        // 返回學員列表
        document.getElementById('backToListBtn').addEventListener('click', () => {
            document.getElementById('studentRecords').style.display = 'none';
            document.getElementById('studentList').style.display = 'block';
            loadStudentList();
        });

        // 飲食份數表功能
        const portionTableModal = document.getElementById('portionTableModal');
        const showPortionTableBtn = document.getElementById('showPortionTableBtn');
        const closePortionTableBtn = document.getElementById('closePortionTableBtn');

        if (showPortionTableBtn) {
            showPortionTableBtn.addEventListener('click', () => {
                // 設定今天日期為預設
                const today = new Date().toISOString().split('T')[0];
                const startDate = new Date();
                startDate.setDate(startDate.getDate() - 7);
                document.getElementById('portionStartDate').value = startDate.toISOString().split('T')[0];
                document.getElementById('portionEndDate').value = today;
                
                // 清空表單
                document.getElementById('portionTableForm').reset();
                
                // 恢復預設值
                document.getElementById('portionStartDate').value = startDate.toISOString().split('T')[0];
                document.getElementById('portionEndDate').value = today;
                
                portionTableModal.style.display = 'flex';
            });
            
            // 選擇起始日期後，自動計算結束日期（+7天）
            document.getElementById('portionStartDate').addEventListener('change', function() {
                const startVal = this.value;
                if (startVal) {
                    const start = new Date(startVal);
                    start.setDate(start.getDate() + 7);
                    document.getElementById('portionEndDate').value = start.toISOString().split('T')[0];
                }
            });
        }

        // 關閉 modal
        if (closePortionTableBtn) {
            closePortionTableBtn.addEventListener('click', () => {
                portionTableModal.style.display = 'none';
            });
        }

        // 儲存飲食份數表
        document.getElementById('portionTableForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentStudentUid) {
                alert('請先選擇學員');
                return;
            }
            
            const startDate = document.getElementById('portionStartDate').value;
            const endDate = document.getElementById('portionEndDate').value;
            
            if (!startDate || !endDate) {
                alert('請選擇日期範圍');
                return;
            }
            
            const form = e.target;
            const meals = ['早餐', '早點', '午餐', '午茶', '晚餐', '宵夜'];
            const nutrients = ['C', 'P', 'F', 'V'];
            
            // 儲存起始日期的資料
            const portionData = {
                userId: currentStudentUid,
                紀錄日期: startDate,
                結束日期: endDate,
                更新時間: new Date()
            };
            
            // 收集每餐的時間和營養素數值
            meals.forEach(meal => {
                const time = form.querySelector(`[name="${meal}時間"]`).value;
                portionData[`${meal}時間`] = time || '';
                
                nutrients.forEach(nutrient => {
                    const value = form.querySelector(`[name="${meal}${nutrient}"]`).value;
                    portionData[`${meal}${nutrient}`] = parseInt(value) || 0;
                });
            });
            
            try {
                // 檢查是否已有當天紀錄
                const existingQuery = query(
                    collection(db, "飲食份數表"),
                    where("userId", "==", currentStudentUid),
                    where("紀錄日期", "==", startDate)
                );
                const existingDocs = await getDocs(existingQuery);
                
                if (existingDocs.empty) {
                    // 新增
                    await addDoc(collection(db, "飲食份數表"), portionData);
                } else {
                    // 更新
                    const docId = existingDocs.docs[0].id;
                    await updateDoc(doc(db, "飲食份數表", docId), portionData);
                }
                
                alert('儲存成功！');
                portionTableModal.style.display = 'none';
                
                // 自動重新載入對齊顯示
                if (document.getElementById('leftAlignedDisplay')) {
                    loadAlignedRecords();
                }
            } catch (error) {
                console.error('儲存失敗:', error);
                alert('儲存失敗：' + error.message);
            }
        });

        // 點擊背景關閉
        if (portionTableModal) {
            portionTableModal.addEventListener('click', (e) => {
                if (e.target === portionTableModal) {
                    portionTableModal.style.display = 'none';
                }
            });
        }

        // 新增學員功能
        const addStudentBtn = document.getElementById('addStudentBtn');
        const addStudentModal = document.getElementById('addStudentModal');
        const addStudentForm = document.getElementById('addStudentForm');
        const cancelAddStudent = document.getElementById('cancelAddStudent');
        const submitAddStudent = document.getElementById('submitAddStudent');

        if (addStudentBtn) {
            addStudentBtn.addEventListener('click', () => {
                addStudentModal.style.display = 'flex';
            });
        }

        if (cancelAddStudent) {
            cancelAddStudent.addEventListener('click', () => {
                addStudentModal.style.display = 'none';
                addStudentForm.reset();
            });
        }

        if (addStudentModal) {
            addStudentModal.addEventListener('click', (e) => {
                if (e.target === addStudentModal) {
                    addStudentModal.style.display = 'none';
                    addStudentForm.reset();
                }
            });
        }

        if (addStudentForm) {
            addStudentForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('newUsername').value.trim();
                const email = document.getElementById('newEmail').value.trim();
                const password = document.getElementById('newPassword').value;
                
                if (!username || !email || !password) {
                    alert('請填寫所有欄位');
                    return;
                }
                
                if (password.length < 6) {
                    alert('密碼至少需要6個字元');
                    return;
                }
                
                submitAddStudent.disabled = true;
                submitAddStudent.textContent = '新增中...';
                
                try {
                    // 檢查使用者名稱是否已被使用
                    const checkQuery = query(collection(db, "users"), where("username", "==", username.toLowerCase()));
                    const checkSnapshot = await getDocs(checkQuery);
                    
                    if (!checkSnapshot.empty) {
                        throw new Error('此使用者名稱已被使用');
                    }
                    
                    // 建立 Firebase Auth 帳戶
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    // 儲存到 Firestore
                    await setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        username: username.toLowerCase(),
                        email: email,
                        role: 'customer',
                        createdAt: serverTimestamp()
                    });
                    
                    alert('學員新增成功！');
                    addStudentModal.style.display = 'none';
                    addStudentForm.reset();
                    loadStudentList(); // 重新載入列表
                    
                } catch (error) {
                    console.error('新增學員失敗:', error);
                    alert('新增失敗: ' + error.message);
                } finally {
                    submitAddStudent.disabled = false;
                    submitAddStudent.textContent = '新增';
                }
            });
        }

        // 登出按鈕
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            // 使用 location.replace 防止後退
            window.location.replace('index.html');
        });

        // 防止頁面被緩存 - 每次頁面顯示時都檢查
        window.onpageshow = function(event) {
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    window.location.replace('login.html');
                } else {
                    // 從 localStorage 取得 username
                    const savedUsername = localStorage.getItem('twkt_username');
                    
                    let userName = '';
                    let userRole = 'customer';
                    
                    if (savedUsername) {
                        const usersQuery = query(collection(db, "users"), where("username", "==", savedUsername));
                        const usersSnapshot = await getDocs(usersQuery);
                        
                        if (!usersSnapshot.empty) {
                            const userData = usersSnapshot.docs[0].data();
                            userRole = userData.role || 'customer';
                            userName = userData.username || '';
                        }
                    }
                    
                    // 嘗試從客戶資料獲取姓名
                    const customerQuery = query(collection(db, "客戶資料"), where("userId", "==", user.uid));
                    const customerSnapshot = await getDocs(customerQuery);
                    if (!customerSnapshot.empty) {
                        userName = customerSnapshot.docs[0].data().姓名 || '';
                    }
                    
                    const headerTitle = document.getElementById('pageTitle');
                    if (userRole === 'admin') {
                        headerTitle.textContent = '體重管理班主任 ' + userName;
                    } else {
                        headerTitle.textContent = '體重管理班學員 ' + userName;
                    }
                }
            });
        };

        // 頁面可見性變化時重新檢查
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') {
                onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        window.location.replace('login.html');
                    } else {
                        // 從 localStorage 取得 username
                        const savedUsername = localStorage.getItem('twkt_username');
                        
                        let userRole = 'customer';
                        
                        if (savedUsername) {
                            const usersQuery = query(collection(db, "users"), where("username", "==", savedUsername));
                            const usersSnapshot = await getDocs(usersQuery);
                            
                            if (!usersSnapshot.empty) {
                                userRole = usersSnapshot.docs[0].data().role || 'customer';
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
