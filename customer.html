<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>體重管理班</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #007AFF;
            --secondary-color: #5856D6;
            --background-color: #F2F2F7;
            --card-background: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #8E8E93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            text-decoration: none;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1200;
            align-items: center;
            justify-content: center;
        }

        .password-modal-content {
            background: #fff;
            width: 92%;
            max-width: 420px;
            border-radius: 14px;
            padding: 18px;
        }

        .password-modal-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .password-field {
            margin-bottom: 10px;
        }

        .password-field label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 4px;
            color: #333;
        }

        .password-field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .password-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
        }

        .password-btn {
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .password-btn-cancel {
            background: #f1f1f1;
            color: #333;
        }

        .password-btn-submit {
            background: #007AFF;
            color: #fff;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 30px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .menu-card {
            background: var(--card-background);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0, 122, 255, 0.2);
        }

        .menu-card:nth-child(1) .menu-icon { background: linear-gradient(135deg, #007AFF, #5856D6); }
        .menu-card:nth-child(2) .menu-icon { background: linear-gradient(135deg, #FF9500, #FF3B30); }
        .menu-card:nth-child(3) .menu-icon { background: linear-gradient(135deg, #34C759, #30D158); }
        .menu-card:nth-child(4) .menu-icon { background: linear-gradient(135deg, #FF2D55, #FF6B6B); }
        .menu-card:nth-child(5) .menu-icon { background: linear-gradient(135deg, #5856D6, #AF52DE); }

        .menu-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .menu-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .menu-desc {
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .mobile-top-actions {
            display: none;
            gap: 8px;
            margin-bottom: 12px;
        }

        .mobile-info-btn {
            flex: 1;
            border: none;
            border-radius: 10px;
            padding: 10px 8px;
            background: #007AFF;
            color: #fff;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
        }

        .mobile-info-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 2200;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .mobile-info-modal.show {
            display: flex;
        }

        .mobile-info-modal-card {
            width: min(520px, 100%);
            max-height: 80vh;
            overflow: auto;
            background: #fff;
            border-radius: 14px;
            padding: 14px;
        }

        .mobile-info-modal-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .mobile-info-modal-close {
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            background: #e5e7eb;
            color: #111827;
            cursor: pointer;
            font-size: 0.8125rem;
        }

        @media screen and (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 14px;
                padding: 16px;
                max-width: 420px;
            }
            #desktopRecordsContainer { display: none !important; }
            #mobileRecordsContent { display: block !important; }
            #studentRecordsContent { display: none !important; }
            #studentRecords { max-width: 600px; }
            .mobile-top-actions { display: flex; }
        }
        
        @media screen and (min-width: 769px) {
            #desktopRecordsContainer { display: flex !important; }
            #mobileRecordsContent { display: none !important; }
            #studentRecordsContent { display: none !important; }
            #showPortionTableBtn { display: block; }
            .mobile-top-actions { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="pageTitle">體重管理班</h1>
        <div class="header-actions">
            <button class="logout-btn" id="changePasswordBtn" type="button">修改密碼</button>
            <a href="index.html" class="logout-btn" id="logoutBtn">登出</a>
        </div>
    </div>

    <!-- 學員列表（管理員用） -->
    <div id="studentList" style="display:none;padding:20px;max-width:600px;margin:0 auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="font-size:1.25rem;">學員列表</h2>
            <button id="addStudentBtn" style="background:#007AFF;color:white;border:none;padding:10px 20px;border-radius:8px;font-size:0.875rem;cursor:pointer;">+ 新增學員</button>
        </div>
        <div style="margin-bottom:12px;display:flex;justify-content:flex-end;">
            <select id="courseStatusFilter" style="border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:0.875rem;background:#fff;color:#333;min-width:140px;">
                <option value="全部">全部狀態</option>
                <option value="課程中">課程中</option>
                <option value="已完成">已完成</option>
            </select>
        </div>
        <div id="studentListContent"></div>
    </div>

    <!-- 學員每日飲食紀錄（管理員用） -->
    <div id="studentRecords" style="display:none;padding:20px;max-width:1200px;margin:0 auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <button id="backToListBtn" style="background:none;border:none;font-size:1rem;cursor:pointer;padding:8px;">← 返回</button>
            <h2 id="studentNameTitle" style="font-size:1.25rem;flex:1;text-align:center;margin-right:60px;">學員飲食紀錄</h2>
            <button id="showPortionTableBtn" style="background:#34C759;color:white;border:none;padding:8px 16px;border-radius:8px;font-size:0.875rem;cursor:pointer;white-space:nowrap;">新增飲食份數表</button>
        </div>

        <div class="mobile-top-actions" id="mobileTopInfoActions">
            <button type="button" class="mobile-info-btn" data-panel="basic">學員基本資料</button>
            <button type="button" class="mobile-info-btn" data-panel="initial">初始體重三圍</button>
            <button type="button" class="mobile-info-btn" data-panel="constitution">中醫體質檢測</button>
            <button type="button" class="mobile-info-btn" data-panel="trend">體重曲線圖</button>
        </div>
        
        <!-- 電腦版：並排顯示 -->
        <div id="desktopRecordsContainer" style="display:none;gap:20px;justify-content:center;">
            <div style="width:260px;">
                <h3 style="font-size:1rem;margin-bottom:12px;">學員項目</h3>
                <div style="display:flex;flex-direction:column;gap:12px;">
                    <div id="studentBasicInfoCard" style="background:white;padding:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                        <div style="font-weight:600;margin-bottom:6px;">學員基本資料</div>
                        <div style="font-size:0.8125rem;color:#6b7280;">載入中...</div>
                    </div>
                    <div id="studentInitialBodyCard" style="background:white;padding:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                        <div style="font-weight:600;margin-bottom:6px;">初始體重三圍</div>
                        <div style="font-size:0.8125rem;color:#6b7280;">載入中...</div>
                    </div>
                    <div id="studentConstitutionCard" style="background:white;padding:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                        <div style="font-weight:600;margin-bottom:6px;">中醫體質檢測</div>
                        <div style="font-size:0.8125rem;color:#6b7280;">載入中...</div>
                    </div>
                    <div id="studentTrendCard" style="background:white;padding:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                        <div style="font-weight:600;margin-bottom:6px;">體重紀錄曲線圖</div>
                        <div style="font-size:0.8125rem;color:#6b7280;">載入中...</div>
                    </div>
                </div>
            </div>
            <div style="width:500px;">
                <h3 style="font-size:1rem;margin-bottom:12px;">每日飲食紀錄</h3>
                <div id="leftAlignedDisplay"></div>
            </div>
            <div style="width:auto;">
                <h3 style="font-size:1rem;margin-bottom:12px;">飲食份數表</h3>
                <div id="rightAlignedDisplay"></div>
            </div>
        </div>
        
        <!-- 手機版和電腦版左側備用 -->
        <div id="studentRecordsContent"></div>
        
        <!-- 手機版 -->
        <div id="mobileRecordsContent"></div>
    </div>

    <div class="mobile-info-modal" id="mobileInfoModal">
        <div class="mobile-info-modal-card">
            <div class="mobile-info-modal-title" id="mobileInfoModalTitle">資料</div>
            <div id="mobileInfoModalBody" style="font-size:0.875rem;line-height:1.7;"></div>
            <button type="button" class="mobile-info-modal-close" id="mobileInfoModalClose">關閉</button>
        </div>
    </div>

    <div class="mobile-info-modal" id="trendChartModal">
        <div class="mobile-info-modal-card" style="width:min(860px,100%);">
            <div class="mobile-info-modal-title">體重紀錄曲線圖</div>
            <div style="font-size:0.8125rem;color:#6b7280;margin-bottom:8px;">依日期顯示體重(kg)與體脂(%)</div>
            <div style="position:relative;height:min(58vh,420px);">
                <canvas id="studentTrendChartCanvas"></canvas>
            </div>
            <div id="trendChartEmpty" style="display:none;font-size:0.8125rem;color:#9ca3af;margin-top:8px;">尚無可繪製資料</div>
            <button type="button" class="mobile-info-modal-close" id="trendChartModalClose">關閉</button>
        </div>
    </div>

    <!-- 照片 Modal -->
    <div id="photoModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;align-items:center;justify-content:center;">
        <img id="modalImg" style="max-width:90%;max-height:90%;border-radius:8px;">
        <button onclick="document.getElementById('photoModal').style.display='none'" style="position:absolute;top:20px;right:20px;background:none;border:none;color:white;font-size:2rem;cursor:pointer;">✕</button>
    </div>

    <!-- 飲食份數表 Modal (輸入) -->
    <div id="portionTableModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:white;padding:24px;border-radius:16px;width:95%;max-width:800px;max-height:90vh;overflow-y:auto;margin:20px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3 style="font-size:1.125rem;">飲食份數表 - 輸入</h3>
                <button id="closePortionTableBtn" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">✕</button>
            </div>
            <div style="margin-bottom:16px;padding:12px;background:#f5f5f5;border-radius:8px;">
                <label style="display:block;font-size:0.875rem;color:#666;margin-bottom:8px;">選擇日期範圍</label>
                <div style="display:flex;gap:10px;align-items:center;">
                    <input type="date" id="portionStartDate" style="padding:8px;border:1px solid #ddd;border-radius:8px;font-size:0.875rem;">
                    <span>至</span>
                    <input type="date" id="portionEndDate" style="padding:8px;border:1px solid #ddd;border-radius:8px;font-size:0.875rem;">
                </div>
            </div>
            <form id="portionTableForm">
                <table style="width:100%;border-collapse:collapse;font-size:0.8rem;">
                    <tr style="background:#007AFF;color:white;">
                        <th style="padding:8px;border:1px solid #ddd;text-align:center;">餐別</th>
                        <th style="padding:8px;border:1px solid #ddd;text-align:center;">時間</th>
                        <th style="padding:8px;border:1px solid #ddd;text-align:center;">C<br>碳水</th>
                        <th style="padding:8px;border:1px solid #ddd;text-align:center;">P<br>蛋白質</th>
                        <th style="padding:8px;border:1px solid #ddd;text-align:center;">F<br>脂肪</th>
                        <th style="padding:8px;border:1px solid #ddd;text-align:center;">V<br>蔬菜</th>
                    </tr>
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">早餐</td>
                        <td style="padding:8px;border:1px solid #ddd;"><input type="time" name="早餐時間" style="width:100px;padding:4px;border:1px solid #ddd;border-radius:4px;"></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早餐C" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早餐P" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早餐F" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早餐V" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                    </tr>
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">早點</td>
                        <td style="padding:8px;border:1px solid #ddd;"><input type="time" name="早點時間" style="width:100px;padding:4px;border:1px solid #ddd;border-radius:4px;"></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早點C" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早點P" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早點F" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="早點V" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                    </tr>
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">午餐</td>
                        <td style="padding:8px;border:1px solid #ddd;"><input type="time" name="午餐時間" style="width:100px;padding:4px;border:1px solid #ddd;border-radius:4px;"></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午餐C" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午餐P" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午餐F" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午餐V" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>
                    </tr>
                    <tr>
                        <td style="padding:8px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">午茶</td>
                        <td style="padding:8px;border:1px solid #ddd;"><input type="time" name="午茶時間" style="width:100px;padding:4px;border:1px solid #ddd;border-radius:4px;"></td>
                        <td style="padding:4px;border:1px solid #ddd;text-align:center;"><select name="午茶C" style="padding:4px;border:1px solid #ddd;border-radius:4px;width:50px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option></select></td>

        async function redirectIfCourseCompleted(user, userRole, savedUsername = '') {
            if (!user || userRole === 'admin') {
                return false;
            }
            const candidateKeys = [
                user.uid,
                savedUsername,
                (user.email || '').split('@')[0]
            ].filter(Boolean).map((k) => String(k).toLowerCase());

            for (const key of [...new Set(candidateKeys)]) {
                const customerQuery = query(collection(db, "客戶資料"), where("userId", "==", key));
                const customerSnapshot = await getDocs(customerQuery);
                if (customerSnapshot.empty) {
                    continue;
                }
                const customerData = customerSnapshot.docs[0].data();
                if (customerData.課程狀態 !== '已完成') {
                    continue;
                }
                await signOut(auth);
                localStorage.removeItem('twkt_user_id');
                localStorage.removeItem('twkt_username');
                window.location.replace('course-completed.html');
                return true;
            }
            return false;
        }

        // 檢查用戶是否為管理員
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // 未登入，跳轉回登入頁
                window.location.href = 'login.html';
                return;

            // 獲取用戶資料 - 從 localStorage 取得 username
            const savedUsername = localStorage.getItem('twkt_username');
            console.log('savedUsername:', savedUsername);
            
            let userName = '';
            let userRole = 'customer';
            let usersSnapshot = null;
            
                if (savedUsername) {
                    const usersQuery = query(collection(db, "users"), where("username", "==", savedUsername));
                    usersSnapshot = await getDocs(usersQuery);
                console.log('usersSnapshot empty:', usersSnapshot.empty);
                
                if (!usersSnapshot.empty) {
                    const userData = usersSnapshot.docs[0].data();
                    console.log('userData:', userData);
                    userRole = userData.role || 'customer';
                        console.log('userRole:', userRole);
                    }
                }

                if (await redirectIfCourseCompleted(user, userRole, savedUsername || '')) {
                    return;
                }

                // 嘗試從客戶資料獲取姓名
                const customerQuery = query(collection(db, "客戶資料"), where("userId", "==", user.uid));
                const customerSnapshot = await getDocs(customerQuery);
            if (!customerSnapshot.empty) {
                userName = customerSnapshot.docs[0].data().姓名 || '';
            }

            // 如果沒有姓名，使用 username
            if (!userName && usersSnapshot && !usersSnapshot.empty) {
                userName = usersSnapshot.docs[0].data().username || '';
            }

            // 更新標題
            const headerTitle = document.getElementById('pageTitle');
            const menuGrid = document.getElementById('menuGrid');
            const studentList = document.getElementById('studentList');
            
            if (userRole === 'admin') {
                headerTitle.textContent = '體重管理班主任 ' + userName;
                menuGrid.style.display = 'none';
                studentList.style.display = 'block';
                loadStudentList();
            } else {
                headerTitle.textContent = '體重管理班學員 ' + userName;
                menuGrid.style.display = 'grid';
                studentList.style.display = 'none';
            }
        });

        // 渲染菜單

                </a>

        renderMenu();
        document.getElementById('courseStatusFilter').addEventListener('change', applyStudentListFilter);

        let allStudents = [];

        function getDisplayCourseStatus(statusValue) {
            return statusValue === '已完成' ? '已完成' : '課程中';
        }

        function renderStudentList(filteredStudents) {
            const content = document.getElementById('studentListContent');
            if (filteredStudents.length === 0) {
                content.innerHTML = '<p>目前沒有符合篩選條件的學員</p>';
                return;
            }
            let html = '<div style="display:flex;flex-direction:column;gap:12px;">';
            for (const student of filteredStudents) {
                const status = getDisplayCourseStatus(student.課程狀態);
                const badgeBg = status === '已完成' ? '#EAF8EF' : '#E8F3FF';
                const badgeColor = status === '已完成' ? '#1E7E34' : '#0A58CA';
                html += `
                    <div onclick="viewStudentRecords('${student.username}', '${student.studentName}')" style="background:white;padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;">

                            <div style="font-weight:600;font-size:1rem;">${student.studentName}</div>
                            <div style="color:#8E8E93;font-size:0.875rem;">${student.email || '-'}</div>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;" onclick="event.stopPropagation()">
                            <span style="padding:4px 8px;border-radius:999px;font-size:0.75rem;font-weight:600;background:${badgeBg};color:${badgeColor};">${status}</span>
                            <select data-customer-doc-id="${student.customerDocId || ''}" data-uid="${student.uid || ''}" data-username="${student.username}" data-student-name="${student.studentName || ''}" data-email-prefix="${student.emailPrefix || ''}" onchange="updateStudentCourseStatus(event)" style="border:1px solid #ddd;border-radius:8px;padding:6px 8px;font-size:0.8125rem;background:#fff;color:#333;">
                                <option value="課程中" ${status === '課程中' ? 'selected' : ''}>課程中</option>
                                <option value="已完成" ${status === '已完成' ? 'selected' : ''}>已完成</option>
                            </select>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            content.innerHTML = html;
        }

        function applyStudentListFilter() {
            const filterEl = document.getElementById('courseStatusFilter');
            const selectedStatus = filterEl ? filterEl.value : '全部';
            const filteredStudents = allStudents.filter((student) => {
                const status = getDisplayCourseStatus(student.課程狀態);
                return selectedStatus === '全部' ? true : status === selectedStatus;
            });
            renderStudentList(filteredStudents);
        }

        // 載入學員列表
        async function loadStudentList() {
            const content = document.getElementById('studentListContent');
            content.innerHTML = '<p>載入中...</p>';
            
            try {
                console.log('Loading student list...');
                const usersQuery = query(collection(db, "users"), where("role", "==", "customer"));
                const usersSnapshot = await getDocs(usersQuery);
                console.log('usersSnapshot size:', usersSnapshot.size);
                
                if (usersSnapshot.empty) {
                    allStudents = [];
                    content.innerHTML = '<p>目前沒有學員</p>';
                    return;
                }
                
                allStudents = [];
                
                for (const userDoc of usersSnapshot.docs) {
                    const userData = userDoc.data();
                    console.log('userData:', userData);
                    
                    const username = userData.username || userData.email?.split('@')[0] || '-';
                    if (username === '-') continue;

                    const uid = userData.uid || '';
                    const emailPrefix = userData.email?.split('@')[0] || '';
                    const candidateKeys = [uid, username, emailPrefix].filter(Boolean).map((k) => String(k).toLowerCase());
                    let customerDocId = '';
                    let customerData = null;
                    for (const key of [...new Set(candidateKeys)]) {
                        const customerQuery = query(collection(db, "客戶資料"), where("userId", "==", key));
                        const customerSnapshot = await getDocs(customerQuery);
                        if (!customerSnapshot.empty) {
                            customerDocId = customerSnapshot.docs[0].id;
                            customerData = customerSnapshot.docs[0].data();
                            break;
                        }
                    }

                    allStudents.push({
                        uid,
                        username: userData.username || username,
                        email: userData.email || '-',
                        emailPrefix,
                        studentName: customerData?.姓名 || username,
                        customerDocId,
                        課程狀態: customerData?.課程狀態 || '課程中'
                    });
                }
                
                applyStudentListFilter();
            } catch (error) {
                console.error('載入學員列表失敗:', error);
                content.innerHTML = '<p>載入失敗</p>';
            }
        }

        window.updateStudentCourseStatus = async function(event) {
            event.stopPropagation();
            const select = event.target;
            const customerDocId = select.dataset.customerDocId;
            const uid = (select.dataset.uid || '').toLowerCase();
            const username = (select.dataset.username || '').toLowerCase();
            const studentName = select.dataset.studentName || '';
            const emailPrefix = (select.dataset.emailPrefix || '').toLowerCase();
            const newStatus = select.value;
            let resolvedCustomerDocId = customerDocId || '';
            select.disabled = true;
            try {
                if (customerDocId) {
                    await updateDoc(doc(db, "客戶資料", customerDocId), { 課程狀態: newStatus });
                } else {
                    const candidateKeys = [uid, username, emailPrefix].filter(Boolean);
                    let updated = false;
                    let resolvedDocId = '';
                    for (const key of candidateKeys) {
                        const customerQuery = query(collection(db, "客戶資料"), where("userId", "==", key));
                        const customerSnapshot = await getDocs(customerQuery);
                        if (!customerSnapshot.empty) {
                            resolvedDocId = customerSnapshot.docs[0].id;
                            await updateDoc(doc(db, "客戶資料", resolvedDocId), { 課程狀態: newStatus });
                            updated = true;
                            break;
                        }
                    }
                    if (!updated) {
                        const userIdForCreate = uid || username || emailPrefix;
                        if (!userIdForCreate) {
                            alert('找不到此學員可用識別資料，無法標注狀態');
                            return;
                        }
                        const createdDoc = await addDoc(collection(db, "客戶資料"), {
                            userId: userIdForCreate,
                            姓名: studentName || username || '-',
                            課程狀態: newStatus,
                            建立時間: serverTimestamp()
                        });
                        resolvedDocId = createdDoc.id;
                    }

                    select.dataset.customerDocId = resolvedDocId;
                    resolvedCustomerDocId = resolvedDocId;
                }

                allStudents = allStudents.map((student) => {
                    if ((student.username || '').toLowerCase() === username) {
                        return { ...student, 課程狀態: newStatus, customerDocId: resolvedCustomerDocId || student.customerDocId };
                    }
                    return student;
                });
                applyStudentListFilter();

                console.error('更新學員課程狀態失敗:', error);
                alert('更新狀態失敗，請稍後再試');
            } finally {
                select.disabled = false;

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function toMillis(value) {
            if (!value) return 0;
            if (typeof value === 'string') {
                const n = Date.parse(value);
                return Number.isNaN(n) ? 0 : n;
            }
            if (typeof value?.toMillis === 'function') return value.toMillis();
            if (typeof value?.seconds === 'number') return value.seconds * 1000;
            const n = Date.parse(String(value));
            return Number.isNaN(n) ? 0 : n;
        }

        function normalizeAdviceConversation(record = {}) {
            const chat = Array.isArray(record.建議對話) ? record.建議對話 : [];
            const normalized = chat
                .map((item) => ({
                    role: item?.role === 'student' ? 'student' : 'admin',
                    text: String(item?.text || '').trim(),
                    createdAt: item?.createdAt || ''
                }))
                .filter((item) => item.text);

            if (normalized.length === 0) {
                if (record.管理員建議) {
                    normalized.push({ role: 'admin', text: String(record.管理員建議), createdAt: record.建議更新時間 || '' });
                }
                if (record.學員回覆) {
                    normalized.push({ role: 'student', text: String(record.學員回覆), createdAt: record.學員回覆更新時間 || '' });
                }
            }

            return normalized.sort((a, b) => toMillis(a.createdAt) - toMillis(b.createdAt));
        }

        function formatAdviceTime(value) {
            const ms = toMillis(value);
            if (!ms) return '';
            const d = new Date(ms);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return `${y}/${m}/${day} ${hh}:${mm}`;
        }

        function renderAdviceConversationHtml(record, compact = false) {
            const messages = normalizeAdviceConversation(record);
            if (!messages.length) {
                return `<div style="font-size:${compact ? '0.75rem' : '0.8rem'};color:#9ca3af;">尚無對話</div>`;
            }
            return messages.map((msg) => {
                const isAdmin = msg.role === 'admin';
                const metaSize = compact ? '0.68rem' : '0.72rem';
                const bubbleSize = compact ? '0.78rem' : '0.82rem';
                return `
                    <div style="margin-bottom:6px;">
                        <div style="font-size:${metaSize};color:#6b7280;margin-bottom:2px;">${isAdmin ? '管理者營養師' : '學員'} ${formatAdviceTime(msg.createdAt)}</div>
                        <div style="font-size:${bubbleSize};line-height:1.5;white-space:pre-wrap;border:1px solid ${isAdmin ? '#a7f3d0' : '#bfdbfe'};background:${isAdmin ? '#ecfdf5' : '#eff6ff'};color:${isAdmin ? '#065f46' : '#1e3a8a'};border-radius:8px;padding:7px 8px;">${escapeHtml(msg.text)}</div>
                    </div>
                `;
            }).join('');
        }

                if (!snapshot.empty) {

                }
            }
            return null;
        }

        function resolveConstitutionType(coldHotScore, wetDryScore) {
            const coldHot = Number(coldHotScore);
            const wetDry = Number(wetDryScore);
            if (!Number.isFinite(coldHot) || !Number.isFinite(wetDry)) return '-';
            const coldHotAvg = coldHot / 13;
            const wetDryAvg = wetDry / 14;
            if (coldHotAvg < 1.5 && wetDryAvg < 1.5) return '陽虛體質';
            if (coldHotAvg < 1.5 && wetDryAvg >= 1.5) return '痰濕體質';
            if (coldHotAvg >= 1.5 && wetDryAvg < 1.5) return '陰虛體質';
            return '陽盛體質';
        }

        function buildTrendPoints(records = []) {
            return records
                .filter((row) => row && row.紀錄日期)
                .sort((a, b) => String(a.紀錄日期).localeCompare(String(b.紀錄日期)))
                .map((row) => {
                    const weight = Number(row.體重);
                    const fat = Number(row.體脂);
                    return {
                        date: String(row.紀錄日期),
                        weight: Number.isFinite(weight) ? weight : null,
                        fat: Number.isFinite(fat) ? fat : null
                    };
                });
        }

        // 將時間輸入改為下拉選單（00:00 ~ 24:00）
        function initPortionHourSelects() {
            const form = document.getElementById('portionTableForm');
            if (!form) return;
            const timeInputs = form.querySelectorAll('input[name$="時間"]');
            if (timeInputs.length === 0) return;

            const optionsHtml = ['<option value="">請選擇</option>'];
            for (let h = 0; h <= 24; h++) {
                const hh = String(h).padStart(2, '0');
                optionsHtml.push(`<option value="${hh}:00">${h}時</option>`);
            }

            timeInputs.forEach((inputEl) => {
                const selectEl = document.createElement('select');
                selectEl.name = inputEl.name;
                selectEl.style.cssText = inputEl.style.cssText;
                selectEl.innerHTML = optionsHtml.join('');

                inputEl.replaceWith(selectEl);

            const nutrients = ['C', 'P', 'F', 'V'];
            
            // 儲存起始日期的資料

                userId: currentStudentUid,
                紀錄日期: startDate,
                結束日期: endDate,
                更新時間: new Date()
            };
            
            // 收集每餐的時間和營養素數值
            meals.forEach(meal => {

                nutrients.forEach(nutrient => {
                    const value = form.querySelector(`[name="${meal}${nutrient}"]`).value;
                    portionData[`${meal}${nutrient}`] = parseInt(value) || 0;
                });
            });
            
            try {

                    await updateDoc(doc(db, "飲食份數表", editingPortionDocId), portionData);
                } else {

                        collection(db, "飲食份數表"),
                        where("userId", "==", currentStudentUid)
                    );

                    const hasOverlap = existingDocs.docs.some((docSnap) => {
                        const data = docSnap.data();
                        const existingStart = data.紀錄日期 || '';
                        const existingEnd = data.結束日期 || existingStart;
                        return startDate <= existingEnd && endDate >= existingStart;
                    });

        }

        // 新增學員功能
        const addStudentBtn = document.getElementById('addStudentBtn');
        const addStudentModal = document.getElementById('addStudentModal');
        const addStudentForm = document.getElementById('addStudentForm');
        const cancelAddStudent = document.getElementById('cancelAddStudent');
        const submitAddStudent = document.getElementById('submitAddStudent');

        if (addStudentBtn) {
            addStudentBtn.addEventListener('click', () => {
                addStudentModal.style.display = 'flex';
            });
        }

        if (cancelAddStudent) {
            cancelAddStudent.addEventListener('click', () => {
                addStudentModal.style.display = 'none';
                addStudentForm.reset();
            });
        }

        if (addStudentModal) {
            addStudentModal.addEventListener('click', (e) => {
                if (e.target === addStudentModal) {
                    addStudentModal.style.display = 'none';
                    addStudentForm.reset();
                }
            });
        }

        if (addStudentForm) {
            addStudentForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('newUsername').value.trim();
                const email = document.getElementById('newEmail').value.trim();
                const password = document.getElementById('newPassword').value;
                
                if (!username || !email || !password) {
                    alert('請填寫所有欄位');
                    return;
                }
                
                if (password.length < 6) {
                    alert('密碼至少需要6個字元');
                    return;
                }
                
                submitAddStudent.disabled = true;
                submitAddStudent.textContent = '新增中...';
                
                try {
                    // 檢查使用者名稱是否已被使用
                    const checkQuery = query(collection(db, "users"), where("username", "==", username.toLowerCase()));
                    const checkSnapshot = await getDocs(checkQuery);
                    
                    if (!checkSnapshot.empty) {
                        throw new Error('此使用者名稱已被使用');
                    }
                    
                    // 建立 Firebase Auth 帳戶
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    // 儲存到 Firestore
                    await setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        username: username.toLowerCase(),
                        email: email,
                        role: 'customer',
                        createdAt: serverTimestamp()
                    });
                    
                    alert('學員新增成功！');
                    addStudentModal.style.display = 'none';
                    addStudentForm.reset();
                    loadStudentList(); // 重新載入列表
                    
                } catch (error) {
                    console.error('新增學員失敗:', error);
                    alert('新增失敗: ' + error.message);
                } finally {
                    submitAddStudent.disabled = false;
                    submitAddStudent.textContent = '新增';
                }
            });
        }

        // 登出按鈕
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            // 使用 location.replace 防止後退
            window.location.replace('index.html');
        });

        // 修改密碼（彈窗輸入舊密碼與新密碼）
        const changePasswordModal = document.getElementById('changePasswordModal');
        const oldPasswordInput = document.getElementById('oldPasswordInput');
        const newPasswordInput = document.getElementById('newPasswordInput');
        const confirmNewPasswordInput = document.getElementById('confirmNewPasswordInput');
        document.getElementById('changePasswordBtn').addEventListener('click', () => {
            oldPasswordInput.value = '';
            newPasswordInput.value = '';
            confirmNewPasswordInput.value = '';
            changePasswordModal.style.display = 'flex';
        });
        document.getElementById('cancelChangePasswordBtn').addEventListener('click', () => {
            changePasswordModal.style.display = 'none';
        });
        changePasswordModal.addEventListener('click', (e) => {
            if (e.target === changePasswordModal) changePasswordModal.style.display = 'none';
        });
        document.getElementById('submitChangePasswordBtn').addEventListener('click', async () => {
            const oldPassword = oldPasswordInput.value;
            const newPassword = newPasswordInput.value;
            const confirmNewPassword = confirmNewPasswordInput.value;
            if (!oldPassword || !newPassword || !confirmNewPassword) {
                alert('請輸入舊密碼、新密碼與再次確認密碼');
                return;
            }
            if (newPassword !== confirmNewPassword) {
                alert('兩次輸入的新密碼不一致');
                return;
            }
            if (newPassword.length < 6) {
                alert('新密碼至少需 6 碼');
                return;
            }
            try {
                const user = auth.currentUser;
                if (!user || !user.email) {
                    alert('目前無法取得登入資訊，請重新登入後再試');
                    return;
                }
                const credential = EmailAuthProvider.credential(user.email, oldPassword);
                await reauthenticateWithCredential(user, credential);
                await updatePassword(user, newPassword);
                changePasswordModal.style.display = 'none';
                alert('密碼修改成功');
            } catch (error) {
                console.error('修改密碼失敗:', error);
                if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    alert('舊密碼錯誤');
                } else {
                    alert('修改失敗：' + (error.message || '請稍後再試'));
                }
            }
        });

        // 防止頁面被緩存 - 每次頁面顯示時都檢查
        window.onpageshow = function(event) {
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    window.location.replace('login.html');
                } else {
                    // 從 localStorage 取得 username
                    const savedUsername = localStorage.getItem('twkt_username');
                    
                    let userName = '';
                    let userRole = 'customer';
                    
                    if (savedUsername) {
                        const usersQuery = query(collection(db, "users"), where("username", "==", savedUsername));
                        const usersSnapshot = await getDocs(usersQuery);
                        
                        if (!usersSnapshot.empty) {
                            const userData = usersSnapshot.docs[0].data();
                            userRole = userData.role || 'customer';
                            userName = userData.username || '';
                        }
                    }

                    if (await redirectIfCourseCompleted(user, userRole, savedUsername || '')) {
                        return;
                    }
                    
                    // 嘗試從客戶資料獲取姓名
                    const customerQuery = query(collection(db, "客戶資料"), where("userId", "==", user.uid));
                    const customerSnapshot = await getDocs(customerQuery);
                    if (!customerSnapshot.empty) {
                        userName = customerSnapshot.docs[0].data().姓名 || '';
                    }
                    
                    const headerTitle = document.getElementById('pageTitle');
                    if (userRole === 'admin') {
                        headerTitle.textContent = '體重管理班主任 ' + userName;
                    } else {
                        headerTitle.textContent = '體重管理班學員 ' + userName;
                    }
                }
            });
        };

        // 頁面可見性變化時重新檢查
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') {
                onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        window.location.replace('login.html');
                    } else {
                        const savedUsername = localStorage.getItem('twkt_username');
                        let userRole = 'customer';
                        
                        if (savedUsername) {
                            const usersQuery = query(collection(db, "users"), where("username", "==", savedUsername));
                            const usersSnapshot = await getDocs(usersQuery);
                            
                            if (!usersSnapshot.empty) {
                                userRole = usersSnapshot.docs[0].data().role || 'customer';
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
