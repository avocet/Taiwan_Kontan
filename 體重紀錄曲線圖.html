<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>體重紀錄曲線圖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #007AFF;
            --secondary-color: #5856D6;
            --background-color: #F2F2F7;
            --card-background: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #8E8E93;
            --border-color: #E5E7EB;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #fff;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.875rem;
        }

        .header h1 {
            font-size: 1.125rem;
            font-weight: 700;
        }

        .content {
            padding: 16px;
            max-width: 980px;
            margin: 0 auto;
        }

        .chart-card {
            background: var(--card-background);
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 16px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .card-subtitle {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .canvas-wrap {
            position: relative;
            height: min(68vh, 520px);
            width: 100%;
        }

        .loading, .empty {
            margin-top: 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        @media screen and (max-width: 428px) {
            .header {
                padding: 16px;
            }
            .header h1 {
                font-size: 1rem;
            }
            .canvas-wrap {
                height: 56vh;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="customer.html" class="back-btn">← 返回</a>
        <h1>體重紀錄曲線圖</h1>
    </div>

    <div class="content">
        <div class="chart-card">
            <div class="card-title">每日飲食紀錄趨勢</div>
            <div class="card-subtitle">依紀錄日期顯示體重（kg）與體脂（%）</div>
            <div class="canvas-wrap">
                <canvas id="trendChart"></canvas>
            </div>
            <div class="loading" id="loading">載入中...</div>
            <div class="empty" id="empty" style="display:none;">尚無可繪製的體重/體脂資料</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyK0sGYh_M-bJUE4NhZJxz5HkllW4jXxw",
            authDomain: "akso-weightcontroll.firebaseapp.com",
            projectId: "akso-weightcontroll",
            storageBucket: "akso-weightcontroll.firebasestorage.app",
            messagingSenderId: "523229071422",
            appId: "1:523229071422:web:c36fd110cc5812fea2a96f",
            measurementId: "G-DFEEKX4V0S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const currentOrgContext = {
            companyId: localStorage.getItem('twkt_company_id') || 'akso-company',
            classId: localStorage.getItem('twkt_class_id') || 'akso-default-class'
        };

        let trendChart = null;
        const pointValueLabelPlugin = {
            id: 'pointValueLabelPlugin',
            afterDatasetsDraw(chart) {
                const { ctx } = chart;
                ctx.save();
                chart.data.datasets.forEach((dataset, datasetIndex) => {
                    const meta = chart.getDatasetMeta(datasetIndex);
                    if (meta.hidden) return;
                    meta.data.forEach((point, index) => {
                        const rawValue = dataset.data[index];
                        if (rawValue === null || rawValue === undefined || Number.isNaN(Number(rawValue))) return;
                        const value = Number(rawValue);
                        const label = datasetIndex === 0 ? `${value}kg` : `${value}%`;
                        ctx.font = '11px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        ctx.fillStyle = dataset.borderColor || '#111827';
                        ctx.fillText(label, point.x, point.y - 8);
                    });
                });
                ctx.restore();
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace('login.html');
                return;
            }
            const adminDoc = await getDoc(doc(db, "管理員", user.uid));
            if (adminDoc.exists() && adminDoc.data().role === 'admin') {
                await signOut(auth);
                window.location.replace('index.html');
                return;
            }
            await loadChartData(user.uid);
        });

        async function loadChartData(userId) {
            const loadingEl = document.getElementById('loading');
            const emptyEl = document.getElementById('empty');
            try {
                const q = query(collection(db, "每日體重三圍"), where("userId", "==", userId));
                const snapshot = await getDocs(q);

                const rows = snapshot.docs
                    .map((docSnap) => docSnap.data())
                    .filter((row) => {
                        if (row.companyId && row.companyId !== currentOrgContext.companyId) return false;
                        if (row.classId && row.classId !== currentOrgContext.classId) return false;
                        return true;
                    })
                    .filter((d) => d.紀錄日期 && (d.體重 !== undefined || d.體脂 !== undefined))
                    .sort((a, b) => String(a.紀錄日期).localeCompare(String(b.紀錄日期)));

                loadingEl.style.display = 'none';

                if (!rows.length) {
                    emptyEl.style.display = 'block';
                    return;
                }

                const labels = rows.map((d) => d.紀錄日期);
                const weightValues = rows.map((d) => {
                    const n = Number(d.體重);
                    return Number.isFinite(n) ? n : null;
                });
                const fatValues = rows.map((d) => {
                    const n = Number(d.體脂);
                    return Number.isFinite(n) ? n : null;
                });

                renderChart(labels, weightValues, fatValues);
            } catch (error) {
                loadingEl.style.display = 'none';
                emptyEl.style.display = 'block';
                emptyEl.textContent = '載入失敗，請稍後再試';
                console.error('載入曲線圖資料失敗:', error);
            }
        }

        function renderChart(labels, weightValues, fatValues) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) {
                trendChart.destroy();
            }

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: '體重 (kg)',
                            data: weightValues,
                            borderColor: '#007AFF',
                            backgroundColor: 'rgba(0, 122, 255, 0.18)',
                            borderWidth: 2,
                            pointRadius: 3,
                            pointHoverRadius: 5,
                            tension: 0.28,
                            spanGaps: true
                        },
                        {
                            label: '體脂 (%)',
                            data: fatValues,
                            borderColor: '#FF2D55',
                            backgroundColor: 'rgba(255, 45, 85, 0.18)',
                            borderWidth: 2,
                            pointRadius: 3,
                            pointHoverRadius: 5,
                            tension: 0.28,
                            spanGaps: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                boxWidth: 12,
                                usePointStyle: true
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '日期'
                            },
                            ticks: {
                                maxRotation: 0,
                                autoSkip: true,
                                maxTicksLimit: 8
                            },
                            grid: {
                                color: '#EEF2F7'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '數值'
                            },
                            grid: {
                                color: '#EEF2F7'
                            }
                        }
                    }
                },
                plugins: [pointValueLabelPlugin]
            });
        }
    </script>
</body>
</html>
