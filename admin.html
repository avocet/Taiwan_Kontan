<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>TWKT 管理系統 - 後台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #007AFF;
            --secondary-color: #5856D6;
            --background-color: #F2F2F7;
            --card-background: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #8E8E93;
            --border-color: #C6C6C8;
            --success-color: #34C759;
            --error-color: #FF3B30;
            --warning-color: #FF9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .current-customer {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.875rem;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--card-background);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab:hover {
            background: var(--background-color);
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* Content */
        .content {
            padding: 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .calibration-shell {
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 18px;
        }

        .calibration-side,
        .calibration-main {
            background: var(--card-background);
            border-radius: 20px;
            border: 1px solid rgba(15, 23, 42, 0.06);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
        }

        .calibration-side {
            padding: 18px;
            position: sticky;
            top: 96px;
            height: fit-content;
        }

        .calibration-main {
            padding: 24px;
        }

        .calibration-progress-num {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .calibration-progress-label,
        .calibration-legend,
        .calibration-preview,
        .calibration-status {
            color: var(--text-secondary);
        }

        .calibration-progress-bar {
            margin-top: 14px;
            height: 10px;
            background: #edf2fa;
            border-radius: 999px;
            overflow: hidden;
        }

        .calibration-progress-fill {
            display: block;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-color), #5aa2ff);
        }

        .calibration-legend {
            display: grid;
            gap: 8px;
            margin-top: 18px;
            font-size: 0.875rem;
        }

        .calibration-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .calibration-heading {
            margin: 0;
            font-size: 1.35rem;
            color: var(--text-primary);
        }

        .calibration-subtext {
            margin-top: 6px;
            font-size: 0.92rem;
            color: var(--text-secondary);
        }

        .calibration-save-btn,
        .calibration-nav-btn {
            border: none;
            border-radius: 12px;
            min-height: 44px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: transform 0.18s ease, opacity 0.18s ease;
        }

        .calibration-save-btn {
            background: var(--primary-color);
            color: #fff;
            padding: 10px 16px;
            font-weight: 600;
        }

        .calibration-nav-btn {
            background: #fff;
            color: var(--text-primary);
            padding: 10px 14px;
            border: 1px solid #d9e2f1;
            min-width: 120px;
        }

        .calibration-save-btn:hover,
        .calibration-nav-btn:hover {
            transform: translateY(-1px);
        }

        .calibration-question-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #e7f0ff;
            color: var(--primary-color);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .calibration-question-title {
            margin: 14px 0 18px;
            font-size: 1.65rem;
            line-height: 1.35;
        }

        .calibration-section-title {
            margin: 0 0 12px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .calibration-option-list {
            display: grid;
            gap: 10px;
            margin-bottom: 22px;
        }

        .calibration-option-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            border-radius: 16px;
            background: #f8fbff;
            border: 1px solid #dce7f8;
        }

        .calibration-option-text {
            font-size: 1rem;
        }

        .calibration-score-badge {
            flex-shrink: 0;
            min-width: 72px;
            text-align: center;
            padding: 8px 10px;
            border-radius: 999px;
            font-weight: 700;
            background: #fff;
            border: 1px solid #d8e3f6;
        }

        .calibration-score-badge.negative { color: #2563eb; }
        .calibration-score-badge.neutral { color: #64748b; }
        .calibration-score-badge.positive { color: var(--success-color); }

        .calibration-choice-group {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }

        .calibration-chip input {
            display: none;
        }

        .calibration-chip span {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d9e2f1;
            background: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.18s ease;
        }

        .calibration-chip input:checked + span {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 10px 22px rgba(15, 111, 255, 0.18);
        }

        .calibration-preview {
            padding: 14px 16px;
            border-radius: 16px;
            background: #fbfcfe;
            border: 1px dashed #cdd9ec;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .calibration-nav-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .calibration-status {
            margin-top: 16px;
            min-height: 24px;
            font-size: 0.9rem;
        }

        .calibration-status.success { color: var(--success-color); }
        .calibration-status.error { color: var(--error-color); }

        /* Data List */
        .data-card {
            background: var(--card-background);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .data-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .data-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .data-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .data-item {
            font-size: 0.875rem;
        }

        .data-label {
            color: var(--text-secondary);
            margin-right: 4px;
        }

        .data-value {
            color: var(--text-primary);
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete {
            background: rgba(255, 59, 48, 0.1);
            color: var(--error-color);
        }

        .btn-delete:hover {
            background: rgba(255, 59, 48, 0.2);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--card-background);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .detail-grid {
            display: grid;
            gap: 12px;
        }

        .detail-item {
            display: flex;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-label {
            font-weight: 500;
            color: var(--text-secondary);
            width: 100px;
            flex-shrink: 0;
        }

        .detail-value {
            color: var(--text-primary);
        }

        /* Photo Modal */
        .photo-modal {
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
        }

        .photo-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        /* Responsive */
        @media screen and (max-width: 428px) {
            .header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .tab {
                padding: 12px 8px;
                font-size: 0.8125rem;
            }

            .data-info {
                grid-template-columns: 1fr;
            }

            .calibration-shell {
                grid-template-columns: 1fr;
            }

            .calibration-side {
                position: static;
            }

            .calibration-choice-group {
                grid-template-columns: 1fr;
            }

            .calibration-question-title {
                font-size: 1.35rem;
            }

            .calibration-option-card {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>TWKT 管理系統</h1>
            <span class="current-customer" id="currentCustomer"></span>
        </div>
        <div class="header-right">
            <button class="back-btn" id="backBtn">← 客戶列表</button>
            <span class="user-info" id="userEmail">載入中...</span>
            <button class="logout-btn" id="logoutBtn">登出</button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="customers">客戶資料</div>
        <div class="tab" data-tab="weight">減肥歷史</div>
        <div class="tab" data-tab="diet">3日飲食</div>
        <div class="tab" data-tab="constitution">中醫體質</div>
        <div class="tab" data-tab="constitutionCalibration">體質問卷校正</div>
        <div class="tab" data-tab="measurements">每日體重三圍</div>
    </div>

    <!-- Content -->
    <div class="content">
        <!-- 客戶資料 -->
        <div class="tab-content active" id="customers">
            <div class="loading" id="customersLoading">
                <div class="loading-spinner"></div>
                <p>載入中...</p>
            </div>
            <div id="customersList"></div>
        </div>

        <!-- 減肥歷史 -->
        <div class="tab-content" id="weight">
            <div class="loading" id="weightLoading">
                <div class="loading-spinner"></div>
                <p>載入中...</p>
            </div>
            <div id="weightList"></div>
        </div>

        <!-- 3日飲食 -->
        <div class="tab-content" id="diet">
            <div class="loading" id="dietLoading">
                <div class="loading-spinner"></div>
                <p>載入中...</p>
            </div>
            <div id="dietList"></div>
        </div>

        <!-- 中醫體質 -->
        <div class="tab-content" id="constitution">
            <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
                <button type="button" id="openConstitutionCalibrationBtn" style="display:inline-flex;align-items:center;gap:6px;background:#007AFF;color:#fff;border:none;padding:10px 14px;border-radius:10px;font-size:0.875rem;font-weight:600;cursor:pointer;">逐題校正</button>
            </div>
            <div class="loading" id="constitutionLoading">
                <div class="loading-spinner"></div>
                <p>載入中...</p>
            </div>
            <div id="constitutionList"></div>
        </div>

        <div class="tab-content" id="constitutionCalibration">
            <div class="calibration-shell">
                <aside class="calibration-side">
                    <div class="calibration-progress-num" id="calibrationProgressNum">1 / 27</div>
                    <div class="calibration-progress-label">目前校正題目</div>
                    <div class="calibration-progress-bar"><span class="calibration-progress-fill" id="calibrationProgressFill"></span></div>
                    <div class="calibration-legend">
                        <div>二選題：依方向套用 `-1 / +1` 或 `+1 / -1`</div>
                        <div>三選題：依方向套用 `-1 / 0 / +1` 或 `+1 / 0 / -1`</div>
                    </div>
                </aside>

                <section class="calibration-main">
                    <div class="calibration-topbar">
                        <div>
                            <h2 class="calibration-heading">中醫體質問卷逐題校正</h2>
                            <div class="calibration-subtext">一題一題調整題軸與方向，儲存後會同步套用到問卷、學員頁與管理員頁。</div>
                        </div>
                        <button type="button" class="calibration-save-btn" id="calibrationSaveBtn">儲存設定</button>
                    </div>

                    <div class="calibration-question-tag" id="calibrationQuestionMeta">題號 1</div>
                    <h3 class="calibration-question-title" id="calibrationQuestionTitle">載入中...</h3>

                    <div class="calibration-section-title">選項與目前分數</div>
                    <div class="calibration-option-list" id="calibrationOptionList"></div>

                    <div class="calibration-section-title">這一題屬於哪一軸</div>
                    <div class="calibration-choice-group">
                        <label class="calibration-chip">
                            <input type="radio" name="calibrationAxis" value="coldHot">
                            <span>冷熱</span>
                        </label>
                        <label class="calibration-chip">
                            <input type="radio" name="calibrationAxis" value="wetDry">
                            <span>濕乾</span>
                        </label>
                    </div>

                    <div class="calibration-section-title">選項排列方向</div>
                    <div class="calibration-choice-group">
                        <label class="calibration-chip">
                            <input type="radio" name="calibrationDirection" value="normal">
                            <span>排列正確</span>
                        </label>
                        <label class="calibration-chip">
                            <input type="radio" name="calibrationDirection" value="reverse">
                            <span>反轉</span>
                        </label>
                    </div>

                    <div class="calibration-preview" id="calibrationPreviewBox"></div>

                    <div class="calibration-nav-row">
                        <button type="button" class="calibration-nav-btn" id="calibrationPrevBtn">上一題</button>
                        <button type="button" class="calibration-nav-btn" id="calibrationNextBtn">下一題</button>
                    </div>

                    <div class="calibration-status" id="calibrationStatusText"></div>
                </section>
            </div>
        </div>

        <!-- 每日體重三圍 -->
        <div class="tab-content" id="measurements">
            <div class="loading" id="measurementsLoading">
                <div class="loading-spinner"></div>
                <p>載入中...</p>
            </div>
            <div id="measurementsList"></div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">詳細資料</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="detail-grid" id="modalBody"></div>
        </div>
    </div>

    <!-- Photo Modal -->
    <div class="modal photo-modal" id="photoModal">
        <div style="position:absolute;top:20px;right:20px;">
            <button class="modal-close" id="photoModalClose" style="color:white;font-size:2rem;background:none;border:none;cursor:pointer;">&times;</button>
        </div>
        <img id="modalImg" style="max-width:90%;max-height:90%;border-radius:8px;" src="" alt="照片">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, getDoc, deleteDoc, doc, query, orderBy, where, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyK0sGYh_M-bJUE4NhZJxz5HkllW4jXxw",
            authDomain: "akso-weightcontroll.firebaseapp.com",
            projectId: "akso-weightcontroll",
            storageBucket: "akso-weightcontroll.firebasestorage.app",
            messagingSenderId: "523229071422",
            appId: "1:523229071422:web:c36fd110cc5812fea2a96f",
            measurementId: "G-DFEEKX4V0S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const constitutionConfigRef = doc(db, "中醫體質問卷設定", "current");

        let currentCustomerUserId = null;
        let currentCustomerName = null;

        const urlParams = new URLSearchParams(window.location.search);
        currentCustomerUserId = urlParams.get('userId');
        currentCustomerName = urlParams.get('name') || '未知客戶';

        if (currentCustomerUserId) {
            document.getElementById('currentCustomer').textContent = `👤 ${currentCustomerName}`;
            document.getElementById('backBtn').style.display = 'inline-block';
        } else {
            document.getElementById('backBtn').style.display = 'none';
        }

        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = 'customer-list.html';
        });

        // 檢查登入狀態
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // 未登入，跳轉回登入頁
                window.location.href = 'login.html';
            } else {
                // 已登入，顯示用戶資訊
                document.getElementById('userEmail').textContent = user.email;
                // 載入資料
                loadAllData();
            }
        });

        // 登出
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            // 使用 location.replace 防止後退
            window.location.replace('index.html');
        });

        // 防止頁面被緩存 - 每次頁面顯示時都檢查
        window.onpageshow = function(event) {
            onAuthStateChanged(auth, (user) => {
                if (!user) {
                    window.location.replace('admin-login.html');
                }
            });
        };

        // 頁面可見性變化時重新檢查
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                onAuthStateChanged(auth, (user) => {
                    if (!user) {
                        window.location.replace('admin-login.html');
                    }
                });
            }
        });

        // Tab 切換
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                
                const tabId = tab.dataset.tab;

            tabs.forEach(t => t.classList.remove('active'));

            const items = {};

                items[`q${id}`] = { axis: 'coldHot', reverse: false };
            });
            constitutionQuestionIds.wetDry.forEach((id) => {

        async function ensureConstitutionQuestionConfig() {
            try {
                const snapshot = await getDoc(constitutionConfigRef);
                if (snapshot.exists()) {
                    const data = snapshot.data() || {};
                    const savedItems = data.items && typeof data.items === 'object' ? data.items : {};
                    constitutionQuestionConfig = { ...buildDefaultConstitutionConfig(), ...savedItems };
                }

                return counts;
            }, { coldHot: 0, wetDry: 0 });

        function getOptionScore(questionId, optionIndex) {
            const optionCount = constitutionThreeOptionIds.has(questionId) ? 3 : 2;
            let score = 0;
            if (optionCount === 2) score = optionIndex === 0 ? -1 : 1;
            else score = optionIndex === 0 ? -1 : optionIndex === 1 ? 0 : 1;
            return getQuestionConfig(questionId).reverse ? -score : score;
        }

        function mapLegacyConstitutionAnswer(questionId, storedValue) {
            const numericValue = Number(storedValue);
            if (!Number.isFinite(numericValue)) return 0;
            return getOptionScore(questionId, numericValue);
        }

        function getConstitutionScores(data = {}) {
            if (data.回答 && typeof data.回答 === 'object') {
                const version = Number(data.評分版本 || 1);
                let coldHot = 0;
                let wetDry = 0;
                Object.entries(data.回答).forEach(([key, rawValue]) => {
                    const questionId = Number(String(key).replace(/^q/, ''));
                    if (!questionId) return;
                    const score = version >= 3
                        ? getOptionScore(questionId, Number(rawValue))
                        : version === 2
                            ? Number(rawValue)
                            : mapLegacyConstitutionAnswer(questionId, rawValue);
                    if (!Number.isFinite(score)) return;
                    if (getQuestionConfig(questionId).axis === 'coldHot') coldHot += score;
                    else wetDry += score;
                });
                return { coldHot, wetDry };
            }
            return {
                coldHot: Number(data.冷熱體質分數) || 0,
                wetDry: Number(data.濕乾體質分數) || 0
            };
        }

        function resolveConstitutionType(coldHotScore, wetDryScore) {
            const coldHot = Number(coldHotScore);
            const wetDry = Number(wetDryScore);
            if (!Number.isFinite(coldHot) || !Number.isFinite(wetDry)) return '-';
            const counts = getQuestionAxisCounts();
            const coldHotAvg = coldHot / Math.max(1, counts.coldHot);
            const wetDryAvg = wetDry / Math.max(1, counts.wetDry);
            if (coldHotAvg < 0 && wetDryAvg < 0) return '陽虛';
            if (coldHotAvg < 0 && wetDryAvg >= 0) return '痰濕';
            if (coldHotAvg >= 0 && wetDryAvg < 0) return '陰虛';
            return '陽盛';
        }

        function getCalibrationQuestionConfig(questionId) {
            return calibrationConfigDraft[`q${questionId}`] || { axis: 'wetDry', reverse: false };
        }

        function getCalibrationOptionScore(questionId, optionIndex) {
            const item = constitutionCalibrationQuestions.find((row) => row.id === questionId);
            if (!item) return 0;
            let score = 0;
            if (item.options.length === 2) score = optionIndex === 0 ? -1 : 1;
            else score = optionIndex === 0 ? -1 : optionIndex === 1 ? 0 : 1;
            return getCalibrationQuestionConfig(questionId).reverse ? -score : score;
        }

        function getCalibrationScoreClass(score) {
            if (score > 0) return 'positive';
            if (score < 0) return 'negative';
            return 'neutral';
        }

        function renderCalibrationQuestion() {
            const item = constitutionCalibrationQuestions[calibrationCurrentIndex];
            if (!item) return;
            const config = getCalibrationQuestionConfig(item.id);
            const progressNumEl = document.getElementById('calibrationProgressNum');
            const progressFillEl = document.getElementById('calibrationProgressFill');
            const metaEl = document.getElementById('calibrationQuestionMeta');
            const titleEl = document.getElementById('calibrationQuestionTitle');
            const optionListEl = document.getElementById('calibrationOptionList');
            const previewEl = document.getElementById('calibrationPreviewBox');
            const prevBtn = document.getElementById('calibrationPrevBtn');
            const nextBtn = document.getElementById('calibrationNextBtn');

            if (progressNumEl) progressNumEl.textContent = `${calibrationCurrentIndex + 1} / ${constitutionCalibrationQuestions.length}`;
            if (progressFillEl) progressFillEl.style.width = `${((calibrationCurrentIndex + 1) / constitutionCalibrationQuestions.length) * 100}%`;
            if (metaEl) metaEl.textContent = `題號 ${item.id} ． ${config.axis === 'coldHot' ? '冷熱題' : '濕乾題'}`;
            if (titleEl) titleEl.textContent = item.question;
            if (optionListEl) {
                optionListEl.innerHTML = item.options.map((option, optionIndex) => {
                    const score = getCalibrationOptionScore(item.id, optionIndex);
                    const scoreText = score > 0 ? `+${score}` : `${score}`;
                    return `
                        <div class="calibration-option-card">
                            <div class="calibration-option-text">${optionIndex + 1}. ${option}</div>
                            <div class="calibration-score-badge ${getCalibrationScoreClass(score)}">${scoreText}</div>
                        </div>
                    `;
                }).join('');
            }

            document.querySelectorAll('input[name="calibrationAxis"]').forEach((input) => {
                input.checked = input.value === config.axis;
            });
            document.querySelectorAll('input[name="calibrationDirection"]').forEach((input) => {
                input.checked = (input.value === 'reverse') === Boolean(config.reverse);
            });

            if (previewEl) {
                previewEl.innerHTML = `
                    目前設定：
                    <strong>${config.axis === 'coldHot' ? '冷熱' : '濕乾'}</strong> /
                    <strong>${config.reverse ? '反轉' : '排列正確'}</strong><br>
                    儲存後，所有新舊體質結果都會優先依這份題目設定重新計算。
                `;
            }

            if (prevBtn) prevBtn.disabled = calibrationCurrentIndex === 0;
            if (nextBtn) nextBtn.disabled = calibrationCurrentIndex === constitutionCalibrationQuestions.length - 1;
        }

        async function initializeCalibrationPanel() {
            await ensureConstitutionQuestionConfig();
            calibrationConfigDraft = JSON.parse(JSON.stringify(constitutionQuestionConfig));
            renderCalibrationQuestion();
        }

        async function saveCalibrationConfig() {
            const saveBtn = document.getElementById('calibrationSaveBtn');
            const statusEl = document.getElementById('calibrationStatusText');
            if (!saveBtn || !statusEl) return;
            const user = auth.currentUser;
            if (!user) {
                statusEl.textContent = '尚未登入，無法儲存。';
                statusEl.className = 'calibration-status error';
                return;
            }
            saveBtn.disabled = true;
            statusEl.textContent = '儲存中...';
            statusEl.className = 'calibration-status';
            try {
                await setDoc(constitutionConfigRef, {
                    version: Date.now(),
                    updatedAt: serverTimestamp(),
                    updatedBy: user.uid,
                    items: calibrationConfigDraft
                }, { merge: true });
                constitutionQuestionConfig = JSON.parse(JSON.stringify(calibrationConfigDraft));
                statusEl.textContent = '設定已儲存，問卷與結果頁會直接套用。';
                statusEl.className = 'calibration-status success';
                await loadConstitution();
            } catch (error) {
                console.error('儲存題目設定失敗:', error);
                statusEl.textContent = `儲存失敗：${error.message}`;
                statusEl.className = 'calibration-status error';
            } finally {
                saveBtn.disabled = false;
            }
        }

        // 建立中醫體質卡片
        function createConstitutionCard(id, data) {
            const { coldHot: coldHotScore, wetDry: wetDryScore } = getConstitutionScores(data);
            const quadrant = resolveConstitutionType(coldHotScore, wetDryScore);
            
            const date = data.建立時間 ? new Date(data.建立時間.seconds * 1000).toLocaleDateString('zh-TW') : '-';
            
            return `
                <div class="data-card">
                    <div class="data-header">
                        <div>
                            <div class="data-title">${data.客戶姓名 || '-'}</div>
                            <div class="data-date">${date}</div>
                        </div>
                        <button class="btn btn-delete" onclick="deleteData('中醫體質四象限', '${id}')">刪除</button>
                    </div>
                    <div class="data-info">
                        <div class="data-item"><span class="data-label">冷熱體質分數：</span><span class="data-value">${coldHotScore} 分</span></div>
                        <div class="data-item"><span class="data-label">濕乾體質分數：</span><span class="data-value">${wetDryScore} 分</span></div>
                    </div>
                    <div style="margin-top:12px;padding:12px;background:var(--background-color);border-radius:8px;text-align:center;">
                        <div style="font-size:0.875rem;color:var(--text-secondary);margin-bottom:8px;">體質分類</div>
                        <div style="font-size:1.25rem;font-weight:bold;color:var(--primary-color);">${quadrant}</div>
                    </div>
                </div>
            `;
        }

        // 建立體重三圍卡片
        function createMeasurementCard(id, data) {
            const photoHtml = data.照片 ? `<img class="data-photo" src="${data.照片}" onclick="showPhoto('${data.照片}')" alt="照片" style="width:80px;height:80px;border-radius:8px;object-fit:cover;cursor:pointer;margin-left:12px;">` : '';
            return `
                <div class="data-card">
                    <div class="data-header">
                        <div style="display:flex;align-items:center;">
                            <div>
                                <div class="data-title">${data.客戶姓名 || '-'}</div>
                                <div class="data-date">${data.紀錄日期 || '-'}</div>
                            </div>
                            ${photoHtml}
                        </div>
                        <button class="btn btn-delete" onclick="deleteData('每日體重三圍', '${id}')">刪除</button>
                    </div>
                    <div class="data-info">
                        <div class="data-item"><span class="data-label">體重：</span><span class="data-value">${data.體重 || '-'} kg</span></div>
                        <div class="data-item"><span class="data-label">胸圍：</span><span class="data-value">${data.胸圍 || '-'} cm</span></div>
                        <div class="data-item"><span class="data-label">腰圍：</span><span class="data-value">${data.腰圍 || '-'} cm</span></div>
                        <div class="data-item"><span class="data-label">臀圍：</span><span class="data-value">${data.臀圍 || '-'} cm</span></div>
                        <div class="data-item"><span class="data-label">大腿圍：</span><span class="data-value">${data.大腿圍 || '-'} cm</span></div>
                        <div class="data-item"><span class="data-label">手臂圍：</span><span class="data-value">${data.手臂圍 || '-'} cm</span></div>
                    </div>
                </div>
            `;
        }

        // 顯示照片
        window.showPhoto = function(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('photoModal').classList.add('show');
        };

        // 刪除資料
        window.deleteData = async function(collectionName, docId) {
            if (!confirm('確定要刪除這筆資料嗎？此操作無法復原。')) {
                return;
            }
            
            try {
                await deleteDoc(doc(db, collectionName, docId));
                alert('刪除成功');
                // 重新載入資料
                if (collectionName === '客戶資料') loadCustomers();
                else if (collectionName === '減肥歷史') loadWeightHistory();
                else if (collectionName === '3日飲食記錄') loadDietRecords();
                else if (collectionName === '中醫體質四象限') loadConstitution();
                else if (collectionName === '每日體重三圍') loadMeasurements();
            } catch (error) {
                console.error('刪除錯誤:', error);
                alert('刪除失敗');
            }
        };

        // Modal 關閉
        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('detailModal').classList.remove('show');
        });

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('detailModal')) {
                document.getElementById('detailModal').classList.remove('show');
            }
        });

        // Photo Modal 關閉
        document.getElementById('photoModalClose').addEventListener('click', () => {
            document.getElementById('photoModal').classList.remove('show');
        });

        document.getElementById('photoModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('photoModal')) {
                document.getElementById('photoModal').classList.remove('show');
            }
        });
    </script>
</body>
</html>
