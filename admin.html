<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>TWKT 管理系統 - 後台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #007AFF;
            --secondary-color: #5856D6;
            --background-color: #F2F2F7;
            --card-background: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #8E8E93;
            --border-color: #C6C6C8;
            --success-color: #34C759;
            --error-color: #FF3B30;
            --warning-color: #FF9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .current-customer {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.875rem;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--card-background);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab:hover {
            background: var(--background-color);
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* Content */
        .content {
            padding: 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Data List */
        .data-card {
            background: var(--card-background);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .data-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .data-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .data-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .data-item {
            font-size: 0.875rem;
        }

        .data-label {
            color: var(--text-secondary);
            margin-right: 4px;
        }

        .data-value {
            color: var(--text-primary);
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete {
            background: rgba(255, 59, 48, 0.1);
            color: var(--error-color);
        }

        .btn-delete:hover {
            background: rgba(255, 59, 48, 0.2);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--card-background);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .detail-grid {
            display: grid;
            gap: 12px;
        }

        .detail-item {
            display: flex;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-label {
            font-weight: 500;
            color: var(--text-secondary);
            width: 100px;
            flex-shrink: 0;
        }

        .detail-value {
            color: var(--text-primary);
        }

        /* Photo Modal */
        .photo-modal {
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
        }

        .photo-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        /* Responsive */
        @media screen and (max-width: 428px) {
            .header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .tab {
                padding: 12px 8px;
                font-size: 0.8125rem;
            }

            .data-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>TWKT 管理系統</h1>
            <span class="current-customer" id="currentCustomer"></span>
        </div>
        <div class="header-right">
            <button class="back-btn" id="backBtn">← 客戶列表</button>
            <span class="user-info" id="userEmail">載入中...</span>
            <button class="logout-btn" id="logoutBtn">登出</button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="customers">客戶資料</div>
        <div class="tab" data-tab="weight">減肥歷史</div>
        <div class="tab" data-tab="diet">3日飲食</div>
        <div class="tab" data-tab="constitution">中醫體質</div>
        <div class="tab" data-tab="measurements">每日體重三圍</div>
    </div>

    <!-- Content -->
    <div class="content">
        <!-- 客戶資料 -->
        <div class="tab-content active" id="customers">
            <div class="loading" id="customersLoading">
                <div class="loading-spinner"></div>
                <p>載入中...</p>
            </div>
            <div id="customersList"></div>
        </div>

        <!-- 減肥歷史 -->
        <div class="tab-content" id="weight">
            <div class="loading" id="weightLoading">
                <div class="loading-spinner"></div>
                <p>載入中...</p>
            </div>
            <div id="weightList"></div>
        </div>

        <!-- 3日飲食 -->
        <div class="tab-content" id="diet">
            <div class="loading" id="dietLoading">
                <div class="loading-spinner"></div>
                <p>載入中...</p>
            </div>
            <div id="dietList"></div>
        </div>

        <!-- 中醫體質 -->
        <div class="tab-content" id="constitution">
            <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
                <a href="中醫體質問卷校正.html" style="display:inline-flex;align-items:center;gap:6px;background:#007AFF;color:#fff;text-decoration:none;padding:10px 14px;border-radius:10px;font-size:0.875rem;font-weight:600;">逐題校正</a>
            </div>
            <div class="loading" id="constitutionLoading">
                <div class="loading-spinner"></div>
                <p>載入中...</p>
            </div>
            <div id="constitutionList"></div>
        </div>

        <!-- 每日體重三圍 -->
        <div class="tab-content" id="measurements">
            <div class="loading" id="measurementsLoading">
                <div class="loading-spinner"></div>
                <p>載入中...</p>
            </div>
            <div id="measurementsList"></div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">詳細資料</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="detail-grid" id="modalBody"></div>
        </div>
    </div>

    <!-- Photo Modal -->
    <div class="modal photo-modal" id="photoModal">
        <div style="position:absolute;top:20px;right:20px;">
            <button class="modal-close" id="photoModalClose" style="color:white;font-size:2rem;background:none;border:none;cursor:pointer;">&times;</button>
        </div>
        <img id="modalImg" style="max-width:90%;max-height:90%;border-radius:8px;" src="" alt="照片">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, getDoc, deleteDoc, doc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyK0sGYh_M-bJUE4NhZJxz5HkllW4jXxw",
            authDomain: "akso-weightcontroll.firebaseapp.com",
            projectId: "akso-weightcontroll",
            storageBucket: "akso-weightcontroll.firebasestorage.app",
            messagingSenderId: "523229071422",
            appId: "1:523229071422:web:c36fd110cc5812fea2a96f",
            measurementId: "G-DFEEKX4V0S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const constitutionConfigRef = doc(db, "中醫體質問卷設定", "current");

        let currentCustomerUserId = null;
        let currentCustomerName = null;

        const urlParams = new URLSearchParams(window.location.search);
        currentCustomerUserId = urlParams.get('userId');
        currentCustomerName = urlParams.get('name') || '未知客戶';

        if (currentCustomerUserId) {
            document.getElementById('currentCustomer').textContent = `👤 ${currentCustomerName}`;
            document.getElementById('backBtn').style.display = 'inline-block';
        } else {
            document.getElementById('backBtn').style.display = 'none';
        }

        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = 'customer-list.html';
        });

        // 檢查登入狀態
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // 未登入，跳轉回登入頁
                window.location.href = 'login.html';
            } else {
                // 已登入，顯示用戶資訊
                document.getElementById('userEmail').textContent = user.email;
                // 載入資料
                loadAllData();
            }
        });

        // 登出
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            // 使用 location.replace 防止後退
            window.location.replace('index.html');
        });

        // 防止頁面被緩存 - 每次頁面顯示時都檢查
        window.onpageshow = function(event) {
            onAuthStateChanged(auth, (user) => {
                if (!user) {
                    window.location.replace('admin-login.html');
                }
            });
        };

        // 頁面可見性變化時重新檢查
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                onAuthStateChanged(auth, (user) => {
                    if (!user) {
                        window.location.replace('admin-login.html');
                    }
                });
            }
        });

        // Tab 切換
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                
                const tabId = tab.dataset.tab;
                document.getElementById(tabId).classList.add('active');
            });
        });

        // 載入所有資料
        async function loadAllData() {
            await Promise.all([
                loadCustomers(),
                loadWeightHistory(),
                loadDietRecords(),
                loadConstitution(),
                loadMeasurements()
            ]);
        }

        // 載入客戶資料
        async function loadCustomers() {
            const loadingEl = document.getElementById('customersLoading');
            const list = document.getElementById('customersList');
            
            try {
                let querySnapshot;
                
                if (currentCustomerUserId) {
                    const q = query(collection(db, "客戶資料"), where("userId", "==", currentCustomerUserId));
                    querySnapshot = await getDocs(q);
                } else {
                    const q = query(collection(db, "客戶資料"));
                    querySnapshot = await getDocs(q);
                }
                
                loadingEl.style.display = 'none';
                
                if (querySnapshot.empty) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>尚無客戶資料</p></div>';
                    return;
                }
                
                let docsArray = [];
                querySnapshot.forEach((d) => {
                    docsArray.push({ id: d.id, data: d.data() });
                });
                
                if (!currentCustomerUserId) {
                    docsArray.sort((a, b) => {
                        const timeA = a.data.建立時間?.seconds || 0;
                        const timeB = b.data.建立時間?.seconds || 0;
                        return timeB - timeA;
                    });
                }
                
                let html = '';
                docsArray.forEach((item) => {
                    html += createCustomerCard(item.id, item.data);
                });
                list.innerHTML = html;
                
            } catch (error) {
                console.error('載入客戶資料錯誤:', error);
                loadingEl.style.display = 'none';
                list.innerHTML = '<div class="empty-state"><p>載入失敗: ' + error.message + '</p></div>';
            }
        }

        // 載入減肥歷史
        async function loadWeightHistory() {
            const loadingEl = document.getElementById('weightLoading');
            const list = document.getElementById('weightList');
            
            try {
                let q;
                if (currentCustomerUserId) {
                    q = query(collection(db, "減肥歷史"), where("userId", "==", currentCustomerUserId));
                } else {
                    q = query(collection(db, "減肥歷史"));
                }
                const querySnapshot = await getDocs(q);
                
                loadingEl.style.display = 'none';
                
                if (querySnapshot.empty) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📈</div><p>尚無減肥歷史記錄</p></div>';
                    return;
                }
                
                let docsArray = [];
                querySnapshot.forEach((doc) => {
                    docsArray.push({ id: doc.id, data: doc.data() });
                });
                
                docsArray.sort((a, b) => {
                    const timeA = a.data.建立時間?.seconds || 0;
                    const timeB = b.data.建立時間?.seconds || 0;
                    return timeB - timeA;
                });
                
                let html = '';
                docsArray.forEach((item) => {
                    html += createWeightCard(item.id, item.data);
                });
                list.innerHTML = html;
                
            } catch (error) {
                console.error('載入減肥歷史錯誤:', error);
                loadingEl.style.display = 'none';
                list.innerHTML = '<div class="empty-state"><p>載入失敗: ' + error.message + '</p></div>';
            }
        }

        // 載入飲食記錄
        async function loadDietRecords() {
            const loadingEl = document.getElementById('dietLoading');
            const list = document.getElementById('dietList');
            
            try {
                let q;
                if (currentCustomerUserId) {
                    q = query(collection(db, "3日飲食記錄"), where("userId", "==", currentCustomerUserId));
                } else {
                    q = query(collection(db, "3日飲食記錄"));
                }
                const querySnapshot = await getDocs(q);
                
                loadingEl.style.display = 'none';
                
                if (querySnapshot.empty) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🥗</div><p>尚無飲食記錄</p></div>';
                    return;
                }
                
                let docsArray = [];
                querySnapshot.forEach((doc) => {
                    docsArray.push({ id: doc.id, data: doc.data() });
                });
                
                docsArray.sort((a, b) => {
                    const timeA = a.data.建立時間?.seconds || 0;
                    const timeB = b.data.建立時間?.seconds || 0;
                    return timeB - timeA;
                });
                
                let html = '';
                docsArray.forEach((item) => {
                    html += createDietCard(item.id, item.data);
                });
                list.innerHTML = html;
                
            } catch (error) {
                console.error('載入飲食記錄錯誤:', error);
                loadingEl.style.display = 'none';
                list.innerHTML = '<div class="empty-state"><p>載入失敗: ' + error.message + '</p></div>';
            }
        }

        // 載入中醫體質
        async function loadConstitution() {
            const loadingEl = document.getElementById('constitutionLoading');
            const list = document.getElementById('constitutionList');
            
            try {
                await ensureConstitutionQuestionConfig();
                let q;
                if (currentCustomerUserId) {
                    q = query(collection(db, "中醫體質四象限"), where("userId", "==", currentCustomerUserId));
                } else {
                    q = query(collection(db, "中醫體質四象限"));
                }
                const querySnapshot = await getDocs(q);
                
                loadingEl.style.display = 'none';
                
                if (querySnapshot.empty) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔮</div><p>尚無中醫體質檢測記錄</p></div>';
                    return;
                }
                
                let docsArray = [];
                querySnapshot.forEach((doc) => {
                    docsArray.push({ id: doc.id, data: doc.data() });
                });
                
                docsArray.sort((a, b) => {
                    const timeA = a.data.建立時間?.seconds || 0;
                    const timeB = b.data.建立時間?.seconds || 0;
                    return timeB - timeA;
                });
                
                let html = '';
                docsArray.forEach((item) => {
                    html += createConstitutionCard(item.id, item.data);
                });
                list.innerHTML = html;
                
            } catch (error) {
                console.error('載入中醫體質錯誤:', error);
                loadingEl.style.display = 'none';
                list.innerHTML = '<div class="empty-state"><p>載入失敗: ' + error.message + '</p></div>';
            }
        }

        // 載入每日體重三圍
        async function loadMeasurements() {
            const loadingEl = document.getElementById('measurementsLoading');
            const list = document.getElementById('measurementsList');
            
            try {
                let q;
                if (currentCustomerUserId) {
                    q = query(collection(db, "每日體重三圍"), where("userId", "==", currentCustomerUserId));
                } else {
                    q = query(collection(db, "每日體重三圍"));
                }
                const querySnapshot = await getDocs(q);
                
                loadingEl.style.display = 'none';
                
                if (querySnapshot.empty) {
                    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚖️</div><p>尚無體重三圍記錄</p></div>';
                    return;
                }
                
                let docsArray = [];
                querySnapshot.forEach((doc) => {
                    docsArray.push({ id: doc.id, data: doc.data() });
                });
                
                docsArray.sort((a, b) => {
                    const dateA = a.data.紀錄日期 || '';
                    const dateB = b.data.紀錄日期 || '';
                    return dateB.localeCompare(dateA);
                });
                
                let html = '';
                docsArray.forEach((item) => {
                    html += createMeasurementCard(item.id, item.data);
                });
                list.innerHTML = html;
                
            } catch (error) {
                console.error('載入體重三圍錯誤:', error);
                loadingEl.style.display = 'none';
                list.innerHTML = '<div class="empty-state"><p>載入失敗: ' + error.message + '</p></div>';
            }
        }

        // 建立客戶卡片
        function createCustomerCard(id, data) {
            const date = data.建立時間 ? new Date(data.建立時間.seconds * 1000).toLocaleDateString('zh-TW') : '-';
            const gender = data.性別 === 'female' ? '女性' : data.性別 === 'male' ? '男性' : '-';
            return `
                <div class="data-card">
                    <div class="data-header">
                        <div>
                            <div class="data-title">${data.姓名 || '-'}</div>
                            <div class="data-date">建立日期：${date}</div>
                        </div>
                        <button class="btn btn-delete" onclick="deleteData('客戶資料', '${id}')">刪除</button>
                    </div>
                    <div class="data-info">
                        <div class="data-item"><span class="data-label">合約編號：</span><span class="data-value">${data.合約編號 || '-'}</span></div>
                        <div class="data-item"><span class="data-label">紀錄日期：</span><span class="data-value">${data.紀錄日期 || '-'}</span></div>

                        <div class="data-item"><span class="data-label">目前體重：</span><span class="data-value">${data.目前體重 || '-'} kg</span></div>

        }

        // 建立飲食記錄卡片
        function createDietCard(id, data) {
            const date = data.建立時間 ? new Date(data.建立時間.seconds * 1000).toLocaleDateString('zh-TW') : '-';
            return `
                <div class="data-card">
                    <div class="data-header">
                        <div>
                            <div class="data-title">${data.客戶姓名 || '-'}</div>
                            <div class="data-date">${date}</div>
                        </div>
                        <button class="btn btn-delete" onclick="deleteData('3日飲食記錄', '${id}')">刪除</button>
                    </div>
                    <div class="data-info">
                        <div class="data-item"><span class="data-label">紀錄日期：</span><span class="data-value">${data.紀錄日期 || '-'}</span></div>
                    </div>
                    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-color);">
                        <div style="font-size:0.8125rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">第1天</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">早餐：</span>${data.day1_breakfast || '-'}</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">午餐：</span>${data.day1_lunch || '-'}</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">晚餐：</span>${data.day1_dinner || '-'}</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">點心：</span>${data.day1_snack || '-'}</div>
                    </div>
                    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-color);">
                        <div style="font-size:0.8125rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">第2天</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">早餐：</span>${data.day2_breakfast || '-'}</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">午餐：</span>${data.day2_lunch || '-'}</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">晚餐：</span>${data.day2_dinner || '-'}</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">點心：</span>${data.day2_snack || '-'}</div>
                    </div>
                    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-color);">
                        <div style="font-size:0.8125rem;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">第3天</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">早餐：</span>${data.day3_breakfast || '-'}</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">午餐：</span>${data.day3_lunch || '-'}</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">晚餐：</span>${data.day3_dinner || '-'}</div>
                        <div style="font-size:0.8125rem;"><span class="data-label">點心：</span>${data.day3_snack || '-'}</div>
                    </div>
                    ${data.備註 ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-color);font-size:0.8125rem;"><span class="data-label">備註：</span>${data.備註}</div>` : ''}
                </div>
            `;
        }

        const constitutionQuestionIds = {
            coldHot: [2, 6, 11, 12, 14, 17, 18, 21, 26],
            wetDry: [1, 3, 4, 5, 7, 8, 9, 10, 13, 15, 16, 19, 20, 22, 23, 24, 25, 27]
        };
        const constitutionThreeOptionIds = new Set([6, 16, 17, 18]);
        let constitutionQuestionConfig = buildDefaultConstitutionConfig();

        function buildDefaultConstitutionConfig() {
            const items = {};
            constitutionQuestionIds.coldHot.forEach((id) => {
                items[`q${id}`] = { axis: 'coldHot', reverse: false };
            });
            constitutionQuestionIds.wetDry.forEach((id) => {
                items[`q${id}`] = { axis: 'wetDry', reverse: false };
            });
            return items;
        }

        async function ensureConstitutionQuestionConfig() {
            try {
                const snapshot = await getDoc(constitutionConfigRef);
                if (snapshot.exists()) {
                    const data = snapshot.data() || {};
                    const savedItems = data.items && typeof data.items === 'object' ? data.items : {};
                    constitutionQuestionConfig = { ...buildDefaultConstitutionConfig(), ...savedItems };
                }
            } catch (error) {
                console.error('載入中醫體質問卷設定失敗:', error);
                constitutionQuestionConfig = buildDefaultConstitutionConfig();
            }
        }

        function getQuestionConfig(questionId) {
            return constitutionQuestionConfig[`q${questionId}`] || { axis: 'wetDry', reverse: false };
        }

        function getQuestionAxisCounts() {
            return Object.values(constitutionQuestionConfig).reduce((counts, item) => {
                if (item?.axis === 'coldHot') counts.coldHot += 1;
                else counts.wetDry += 1;
                return counts;
            }, { coldHot: 0, wetDry: 0 });
        }

        function getOptionScore(questionId, optionIndex) {
            const optionCount = constitutionThreeOptionIds.has(questionId) ? 3 : 2;
            let score = 0;
            if (optionCount === 2) score = optionIndex === 0 ? -1 : 1;
            else score = optionIndex === 0 ? -1 : optionIndex === 1 ? 0 : 1;
            return getQuestionConfig(questionId).reverse ? -score : score;
        }

        function mapLegacyConstitutionAnswer(questionId, storedValue) {
            const numericValue = Number(storedValue);
            if (!Number.isFinite(numericValue)) return 0;
            return getOptionScore(questionId, numericValue);
        }

        function getConstitutionScores(data = {}) {
            if (data.回答 && typeof data.回答 === 'object') {
                const version = Number(data.評分版本 || 1);
                let coldHot = 0;
                let wetDry = 0;
                Object.entries(data.回答).forEach(([key, rawValue]) => {
                    const questionId = Number(String(key).replace(/^q/, ''));
                    if (!questionId) return;
                    const score = version >= 3
                        ? getOptionScore(questionId, Number(rawValue))
                        : version === 2
                            ? Number(rawValue)
                            : mapLegacyConstitutionAnswer(questionId, rawValue);
                    if (!Number.isFinite(score)) return;
                    if (getQuestionConfig(questionId).axis === 'coldHot') coldHot += score;
                    else wetDry += score;
                });
                return { coldHot, wetDry };
            }
            return {
                coldHot: Number(data.冷熱體質分數) || 0,
                wetDry: Number(data.濕乾體質分數) || 0
            };
        }

        function resolveConstitutionType(coldHotScore, wetDryScore) {
            const coldHot = Number(coldHotScore);
            const wetDry = Number(wetDryScore);
            if (!Number.isFinite(coldHot) || !Number.isFinite(wetDry)) return '-';
            const counts = getQuestionAxisCounts();
            const coldHotAvg = coldHot / Math.max(1, counts.coldHot);
            const wetDryAvg = wetDry / Math.max(1, counts.wetDry);
            if (coldHotAvg < 0 && wetDryAvg < 0) return '陽虛';
            if (coldHotAvg < 0 && wetDryAvg >= 0) return '痰濕';
            if (coldHotAvg >= 0 && wetDryAvg < 0) return '陰虛';
            return '陽盛';
        }

        // 建立中醫體質卡片
        function createConstitutionCard(id, data) {
            const { coldHot: coldHotScore, wetDry: wetDryScore } = getConstitutionScores(data);
            const quadrant = resolveConstitutionType(coldHotScore, wetDryScore);
            
            const date = data.建立時間 ? new Date(data.建立時間.seconds * 1000).toLocaleDateString('zh-TW') : '-';
            
            return `
                <div class="data-card">
                    <div class="data-header">
                        <div>
                            <div class="data-title">${data.客戶姓名 || '-'}</div>
                            <div class="data-date">${date}</div>
                        </div>
                        <button class="btn btn-delete" onclick="deleteData('中醫體質四象限', '${id}')">刪除</button>
                    </div>
                    <div class="data-info">
                        <div class="data-item"><span class="data-label">冷熱體質分數：</span><span class="data-value">${coldHotScore} 分</span></div>
                        <div class="data-item"><span class="data-label">濕乾體質分數：</span><span class="data-value">${wetDryScore} 分</span></div>
                    </div>
                    <div style="margin-top:12px;padding:12px;background:var(--background-color);border-radius:8px;text-align:center;">
                        <div style="font-size:0.875rem;color:var(--text-secondary);margin-bottom:8px;">體質分類</div>
                        <div style="font-size:1.25rem;font-weight:bold;color:var(--primary-color);">${quadrant}</div>
                    </div>
                </div>
            `;
        }

        // 建立體重三圍卡片
        function createMeasurementCard(id, data) {
            const photoHtml = data.照片 ? `<img class="data-photo" src="${data.照片}" onclick="showPhoto('${data.照片}')" alt="照片" style="width:80px;height:80px;border-radius:8px;object-fit:cover;cursor:pointer;margin-left:12px;">` : '';
            return `
                <div class="data-card">
                    <div class="data-header">
                        <div style="display:flex;align-items:center;">
                            <div>
                                <div class="data-title">${data.客戶姓名 || '-'}</div>
                                <div class="data-date">${data.紀錄日期 || '-'}</div>
                            </div>
                            ${photoHtml}
                        </div>
                        <button class="btn btn-delete" onclick="deleteData('每日體重三圍', '${id}')">刪除</button>
                    </div>
                    <div class="data-info">
                        <div class="data-item"><span class="data-label">體重：</span><span class="data-value">${data.體重 || '-'} kg</span></div>
                        <div class="data-item"><span class="data-label">胸圍：</span><span class="data-value">${data.胸圍 || '-'} cm</span></div>
                        <div class="data-item"><span class="data-label">腰圍：</span><span class="data-value">${data.腰圍 || '-'} cm</span></div>
                        <div class="data-item"><span class="data-label">臀圍：</span><span class="data-value">${data.臀圍 || '-'} cm</span></div>
                        <div class="data-item"><span class="data-label">大腿圍：</span><span class="data-value">${data.大腿圍 || '-'} cm</span></div>
                        <div class="data-item"><span class="data-label">手臂圍：</span><span class="data-value">${data.手臂圍 || '-'} cm</span></div>
                    </div>
                </div>
            `;
        }

        // 顯示照片
        window.showPhoto = function(url) {
            document.getElementById('modalImg').src = url;
            document.getElementById('photoModal').classList.add('show');
        };

        // 刪除資料
        window.deleteData = async function(collectionName, docId) {
            if (!confirm('確定要刪除這筆資料嗎？此操作無法復原。')) {
                return;
            }
            
            try {
                await deleteDoc(doc(db, collectionName, docId));
                alert('刪除成功');
                // 重新載入資料
                if (collectionName === '客戶資料') loadCustomers();
                else if (collectionName === '減肥歷史') loadWeightHistory();
                else if (collectionName === '3日飲食記錄') loadDietRecords();
                else if (collectionName === '中醫體質四象限') loadConstitution();
                else if (collectionName === '每日體重三圍') loadMeasurements();
            } catch (error) {
                console.error('刪除錯誤:', error);
                alert('刪除失敗');
            }
        };

        // Modal 關閉
        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('detailModal').classList.remove('show');
        });

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('detailModal')) {
                document.getElementById('detailModal').classList.remove('show');
            }
        });

        // Photo Modal 關閉
        document.getElementById('photoModalClose').addEventListener('click', () => {
            document.getElementById('photoModal').classList.remove('show');
        });

        document.getElementById('photoModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('photoModal')) {
                document.getElementById('photoModal').classList.remove('show');
            }
        });
    </script>
</body>
